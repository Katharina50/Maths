<title>Number Trail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF8EC;
    --ink:#2B2D42;
    --coral:#FF6B6B;
    --coral-dark:#E85555;
    --sun:#FFD166;
    --sage:#06D6A0;
    --rose:#EF476F;
    --line:#EADFC8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--paper);
    color:var(--ink);
    font-family:'Quicksand', sans-serif;
    overscroll-behavior:none;
    -webkit-user-select:none; user-select:none;
  }
  body{
    display:flex; flex-direction:column;
    min-height:100vh;
    min-height:100dvh;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .num{font-family:'Baloo 2', sans-serif;}

  /* ---------- Top bar / trail ---------- */
  .topbar{
    padding:14px 18px 10px;
    flex-shrink:0;
  }
  .row1{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:10px;
  }
  .brand{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:19px;
    color:var(--coral-dark);
    display:flex; align-items:center; gap:6px;
  }
  .settingsBtn{
    width:36px; height:36px; border-radius:50%;
    border:2px solid var(--line);
    background:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
    cursor:pointer;
  }
  .trailWrap{
    background:#fff;
    border:2px solid var(--line);
    border-radius:18px;
    padding:10px 14px;
    display:flex;
    align-items:center;
    gap:4px;
    overflow:hidden;
  }
  .trail{
    display:flex; align-items:center; gap:3px;
    flex:1;
    overflow:hidden;
  }
  .pawSlot{
    font-size:20px;
    opacity:0.18;
    flex-shrink:0;
    transition:opacity .25s, transform .25s;
  }
  .pawSlot.filled{ opacity:1; transform:scale(1.12); }
  .streakBadge{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:15px;
    background:var(--sun);
    color:var(--ink);
    border-radius:12px;
    padding:4px 10px;
    flex-shrink:0;
    white-space:nowrap;
  }

  /* ---------- Level toggle ---------- */
  .levelToggle{
    display:flex;
    gap:6px;
    margin-bottom:10px;
  }
  .levelBtn{
    flex:1;
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:13px;
    padding:7px 10px;
    border-radius:10px;
    border:2px solid var(--line);
    background:#fff;
    color:#8a8472;
    cursor:pointer;
  }
  .levelBtn.active{
    background:var(--ink);
    border-color:var(--ink);
    color:#fff;
  }

  /* ---------- Place value chart ---------- */
  .pvChart{
    display:flex;
    justify-content:center;
    gap:6px;
    margin-bottom:18px;
  }
  .pvCol{
    flex:1;
    max-width:110px;
    background:#fff;
    border:2px solid var(--line);
    border-radius:14px;
    overflow:hidden;
  }
  .pvColHead{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:13px;
    text-align:center;
    padding:6px 0;
    color:#fff;
  }
  .pvColHead.h{ background:#06D6A0; }
  .pvColHead.t{ background:#FFD166; color:var(--ink); }
  .pvColHead.o{ background:#FF6B6B; }
  .pvColBody{
    min-height:70px;
    padding:8px 6px;
    display:flex;
    flex-wrap:wrap;
    gap:4px;
    align-items:flex-start;
    justify-content:center;
  }
  .pvCounter{
    font-size:11px;
    font-weight:700;
    border-radius:50%;
    width:24px; height:24px;
    display:flex; align-items:center; justify-content:center;
    color:#fff;
    flex-shrink:0;
  }
  .pvCounter.h{ background:#06D6A0; }
  .pvCounter.t{ background:#FFD166; color:var(--ink); }
  .pvCounter.o{ background:#FF6B6B; }

  /* ---------- Column arithmetic grid ---------- */
  .colGrid{
    display:flex;
    justify-content:center;
    margin-bottom:18px;
  }
  .colTable{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:30px;
    border-collapse:collapse;
  }
  .colTable td{
    width:46px;
    height:50px;
    text-align:center;
    vertical-align:middle;
  }
  .colTable .opCell{ color:var(--coral); font-size:26px; }
  .colTable .ruleRow td{
    border-bottom:3px solid var(--ink);
    height:0;
    padding:0;
  }
  .colTable .missing{
    background:#fff;
    border:3px dashed var(--line);
    border-radius:10px;
  }

  /* ---------- Missing-digit sentence ---------- */
  .digitSentence{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:min(12vw, 46px);
    text-align:center;
    margin-bottom:22px;
    line-height:1.3;
  }
  .digitSentence .blank{
    display:inline-block;
    min-width:0.9em;
    background:#fff;
    border:3px dashed var(--line);
    border-radius:10px;
    padding:0 6px;
    color:var(--coral-dark);
  }

  /* ---------- Main play area ---------- */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:10px 18px 24px;
  }
  .problemCard{
    width:100%;
    max-width:420px;
    text-align:center;
  }
  .opLabel{
    font-size:15px;
    font-weight:600;
    color:#8a8472;
    margin-bottom:6px;
    letter-spacing:0.5px;
  }
  .problem{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:min(20vw, 84px);
    line-height:1;
    margin:6px 0 26px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
  }
  .problem .opSym{ color:var(--coral); }
  .problem .eq{ color:#c9c2ab; }
  .qbox{
    background:#fff;
    border:3px dashed var(--line);
    border-radius:16px;
    min-width:1.3em;
    padding:0 10px;
  }

  .choices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .choiceBtn{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:38px;
    padding:22px 10px;
    border-radius:20px;
    border:none;
    background:#fff;
    border:3px solid var(--line);
    color:var(--ink);
    cursor:pointer;
    transition: transform .12s, background .15s, border-color .15s;
  }
  .choiceBtn:active{ transform:scale(0.95); }
  .choiceBtn.correct{
    background:var(--sage);
    border-color:var(--sage);
    color:#fff;
  }
  .choiceBtn.wrong{
    background:var(--rose);
    border-color:var(--rose);
    color:#fff;
  }
  .choiceBtn.dim{ opacity:0.45; }

  .feedback{
    min-height:34px;
    margin-top:16px;
    font-weight:700;
    font-size:17px;
  }
  .feedback.good{ color:#08966f; }
  .feedback.bad{ color:var(--rose); }

  /* ---------- Word problem text ---------- */
  .wordProblem{
    font-family:'Quicksand', sans-serif;
    font-weight:600;
    font-size:19px;
    line-height:1.45;
    color:var(--ink);
    background:#fff;
    border:2px solid var(--line);
    border-radius:18px;
    padding:18px 20px;
    margin-bottom:22px;
    text-align:left;
  }
  .wordProblem .icon{ font-size:22px; margin-right:6px; }

  /* ---------- Fraction shapes ---------- */
  .fractionRow{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-bottom:22px;
    flex-wrap:wrap;
  }
  .fractionShape{ flex-shrink:0; }
  .fractionCaption{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:22px;
    text-align:center;
    margin-top:6px;
    color:var(--coral-dark);
  }

  /* ---------- Bar chart ---------- */
  .chartWrap{
    background:#fff;
    border:2px solid var(--line);
    border-radius:18px;
    padding:16px 14px 6px;
    margin-bottom:18px;
  }
  .chartTitle{
    font-weight:700;
    font-size:14px;
    color:#8a8472;
    margin-bottom:10px;
    text-align:center;
  }
  .barRow{
    display:flex;
    align-items:flex-end;
    justify-content:space-around;
    height:140px;
    gap:10px;
    padding:0 6px;
  }
  .barCol{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    height:100%;
    flex:1;
  }
  .barVal{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:14px;
    margin-bottom:4px;
  }
  .barFill{
    width:100%;
    max-width:46px;
    border-radius:8px 8px 0 0;
    transition:height .4s ease;
  }
  .barLabel{
    font-size:12px;
    font-weight:700;
    color:#8a8472;
    margin-top:6px;
    text-align:center;
  }

  /* ---------- Scale dial / jug visuals (Mass & Capacity) ---------- */
  .visualRow{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .visualWrap{ flex-shrink:0; text-align:center; }
  .visualCaption{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:18px;
    margin-top:4px;
    color:var(--coral-dark);
  }

  /* ---------- Text input (free-response) ---------- */
  .textInputRow{
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:center;
    margin-top:6px;
  }
  .textInputBox{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:22px;
    text-align:center;
    padding:14px 12px;
    border-radius:16px;
    border:3px solid var(--line);
    background:#fff;
    color:var(--ink);
    width:170px;
    outline:none;
  }
  .textInputBox:focus{ border-color:var(--coral); }
  .textInputBox.correct{ border-color:var(--sage); background:#eafff7; color:#08966f; }
  .textInputBox.wrong{ border-color:var(--rose); background:#fff0f2; color:var(--rose); }
  .checkBtn{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:18px;
    padding:14px 22px;
    border-radius:16px;
    border:none;
    background:var(--coral);
    color:#fff;
    cursor:pointer;
  }
  .checkBtn:active{ transform:scale(0.96); }
  .checkBtn:disabled{ opacity:0.5; }
  .inputHint{
    font-size:13px;
    color:#8a8472;
    margin-top:10px;
    font-weight:600;
  }

  /* ---------- Bottom mode bar ---------- */
  .modeBar{
    flex-shrink:0;
    display:flex;
    gap:8px;
    padding:10px 14px calc(14px + env(safe-area-inset-bottom));
    border-top:2px solid var(--line);
    background:#fffdf7;
    overflow-x:auto;
  }
  .modeBtn{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:14px;
    padding:9px 14px;
    border-radius:14px;
    border:2px solid var(--line);
    background:#fff;
    color:#8a8472;
    white-space:nowrap;
    cursor:pointer;
    flex-shrink:0;
  }
  .modeBtn.active{
    background:var(--coral);
    border-color:var(--coral);
    color:#fff;
  }

  /* ---------- Settings overlay ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(43,45,66,0.45);
    display:flex; align-items:flex-end;
    z-index:50;
    opacity:0; pointer-events:none;
    transition:opacity .2s;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .sheet{
    background:var(--paper);
    width:100%;
    border-radius:24px 24px 0 0;
    padding:22px 22px calc(24px + env(safe-area-inset-bottom));
    transform:translateY(20px);
    transition:transform .2s;
    max-height:80vh;
    overflow-y:auto;
  }
  .overlay.show .sheet{ transform:translateY(0); }
  .sheetTitle{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:22px;
    margin:0 0 14px;
  }
  .fieldLabel{
    font-weight:700;
    font-size:14px;
    color:#8a8472;
    margin:16px 0 8px;
  }
  .rangeRow{ display:flex; align-items:center; gap:10px; }
  .rangeRow select{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:16px;
    padding:10px 12px;
    border-radius:12px;
    border:2px solid var(--line);
    background:#fff;
    flex:1;
  }
  .closeSheet{
    margin-top:22px;
    width:100%;
    padding:14px;
    border-radius:14px;
    border:none;
    background:var(--coral);
    color:#fff;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:17px;
    cursor:pointer;
  }
  .resetBtn{
    margin-top:10px;
    width:100%;
    padding:12px;
    border-radius:14px;
    border:2px solid var(--line);
    background:#fff;
    color:#8a8472;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="row1">
    <div class="brand">🐾 Number Trail</div>
    <button class="settingsBtn" id="settingsBtn" aria-label="Settings">⚙️</button>
  </div>
  <div class="levelToggle" id="levelToggle">
    <button class="levelBtn" data-level="easy">Easy</button>
    <button class="levelBtn" data-level="y3">Year 3</button>
  </div>
  <div class="trailWrap">
    <div class="trail" id="trail"></div>
    <div class="streakBadge" id="streakBadge">🔥 0</div>
  </div>
</div>

<div class="main">
  <div class="problemCard">
    <div class="opLabel" id="opLabel">ADDITION</div>
    <div id="displayArea"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
  </div>
</div>

<div class="modeBar" id="modeBar">
  <button class="modeBtn" data-mode="add">➕ Add</button>
  <button class="modeBtn" data-mode="sub">➖ Subtract</button>
  <button class="modeBtn" data-mode="mul">✖️ Multiply</button>
  <button class="modeBtn" data-mode="div">➗ Divide</button>
  <button class="modeBtn" data-mode="frac">🍕 Fractions</button>
  <button class="modeBtn" data-mode="meas">📏 Measuring</button>
  <button class="modeBtn" data-mode="stat">📊 Graphs</button>
  <button class="modeBtn" data-mode="mix">🎲 Mixed</button>
</div>

<div class="modeBar" id="modeBarY3" style="display:none;">
  <button class="modeBtn" data-mode="pv">🔢 Place Value</button>
  <button class="modeBtn" data-mode="multi">🔁 Multiples</button>
  <button class="modeBtn" data-mode="t3">✖️ 3× Table</button>
  <button class="modeBtn" data-mode="dvy3">➗ Sharing</button>
  <button class="modeBtn" data-mode="fracy3">🍰 Fractions+</button>
  <button class="modeBtn" data-mode="masscap">⚖️ Mass & Capacity</button>
  <button class="modeBtn" data-mode="shapes">🔷 Shapes & Angles</button>
  <button class="modeBtn" data-mode="mixy3">🎲 Mixed</button>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheetTitle">Settings</div>

    <div class="fieldLabel">Biggest number to use</div>
    <div class="rangeRow">
      <select id="maxNum">
        <option value="5">Up to 5</option>
        <option value="10" selected>Up to 10</option>
        <option value="20">Up to 20</option>
        <option value="50">Up to 50</option>
        <option value="100">Up to 100</option>
      </select>
    </div>

    <div class="fieldLabel">Trail length</div>
    <div class="rangeRow">
      <select id="trailLen">
        <option value="5">5 in a row</option>
        <option value="8" selected>8 in a row</option>
        <option value="12">12 in a row</option>
      </select>
    </div>

    <button class="resetBtn" id="resetBtn">Reset best streak</button>
    <button class="closeSheet" id="closeSheet">Done</button>
  </div>
</div>

<script>
(function(){
  const state = {
    level: localStorage.getItem('nt_level') || 'easy',
    mode: localStorage.getItem('nt_mode') || 'add',
    modeY3: localStorage.getItem('nt_mode_y3') || 'pv',
    maxNum: parseInt(localStorage.getItem('nt_max') || '10'),
    trailLen: parseInt(localStorage.getItem('nt_trail') || '8'),
    trailFill: 0,
    streak: 0,
    best: parseInt(localStorage.getItem('nt_best') || '0'),
    current: null,
    locked: false
  };

  const els = {
    displayArea: document.getElementById('displayArea'),
    opLabel: document.getElementById('opLabel'),
    choices: document.getElementById('choices'),
    feedback: document.getElementById('feedback'),
    trail: document.getElementById('trail'),
    streakBadge: document.getElementById('streakBadge'),
    modeBar: document.getElementById('modeBar'),
    modeBarY3: document.getElementById('modeBarY3'),
    levelToggle: document.getElementById('levelToggle'),
    settingsBtn: document.getElementById('settingsBtn'),
    overlay: document.getElementById('overlay'),
    closeSheet: document.getElementById('closeSheet'),
    maxNum: document.getElementById('maxNum'),
    trailLen: document.getElementById('trailLen'),
    resetBtn: document.getElementById('resetBtn')
  };

  const OP_META = {
    add: {sym:'+', label:'ADDITION'},
    sub: {sym:'−', label:'SUBTRACTION'},
    mul: {sym:'×', label:'MULTIPLICATION'},
    div: {sym:'÷', label:'DIVISION'},
    frac: {label:'FRACTIONS'},
    meas: {label:'MEASURING'},
    stat: {label:'GRAPHS'},
    pv: {label:'PLACE VALUE'},
    multi: {label:'MULTIPLES'},
    t3: {label:'3 TIMES TABLE'},
    dvy3: {label:'SHARING & GROUPING'},
    fracy3: {label:'FRACTIONS'},
    masscap: {label:'MASS & CAPACITY'},
    shapes: {label:'SHAPES & ANGLES'}
  };

  function rand(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function choice(arr){ return arr[rand(0, arr.length-1)]; }
  function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
      const j = rand(0, i);
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  const ALL_MODES = ['add','sub','mul','div','frac','meas','stat'];
  const ALL_MODES_Y3 = ['pv','multi','t3','dvy3','fracy3','masscap','shapes'];

  function pickActiveOp(){
    if(state.level === 'y3'){
      if(state.modeY3 !== 'mixy3') return state.modeY3;
      return choice(ALL_MODES_Y3);
    }
    if(state.mode !== 'mix') return state.mode;
    return choice(ALL_MODES);
  }

  // ---------------- Arithmetic ----------------
  function buildArithmetic(op){
    let a,b,answer;
    const max = state.maxNum;

    if(op === 'add'){
      a = rand(0, max); b = rand(0, max);
      answer = a + b;
    } else if(op === 'sub'){
      a = rand(0, max); b = rand(0, a); // never negative
      answer = a - b;
    } else if(op === 'mul'){
      const smallMax = Math.min(max, 12);
      a = rand(0, smallMax); b = rand(0, smallMax);
      answer = a * b;
    } else { // div
      const smallMax = Math.min(max, 12);
      b = rand(1, smallMax);
      answer = rand(0, smallMax);
      a = b * answer; // ensures whole number result
    }

    const meta = OP_META[op];
    const html =
      '<div class="problem">' +
        '<span>' + a + '</span>' +
        '<span class="opSym">' + meta.sym + '</span>' +
        '<span>' + b + '</span>' +
        '<span class="eq">=</span>' +
        '<span class="qbox">?</span>' +
      '</div>';

    return {
      kind: 'arithmetic', op, answer, html,
      choices: makeNumberChoices(answer)
    };
  }

  function makeNumberChoices(answer){
    const set = new Set([answer]);
    let guardCount = 0;
    while(set.size < 4 && guardCount < 50){
      guardCount++;
      const spread = Math.max(3, Math.round(answer * 0.3) + 2);
      let distractor = answer + rand(-spread, spread);
      if(distractor < 0) distractor = answer + rand(1, spread+1);
      if(distractor !== answer) set.add(distractor);
    }
    return shuffle(Array.from(set)).map(v => ({label: String(v), value: v}));
  }

  // ---------------- Fractions ----------------
  // SVG pie/bar showing a shaded fraction; ask "what fraction is shaded?"
  // or show two shapes and ask to compare.
  const FRAC_DENOMS = [2,3,4,5,6,8,10];

  function fracShapeSVG(num, den, size, fillColor){
    size = size || 100;
    const cx = size/2, cy = size/2, r = size/2 - 4;
    let paths = '';
    const slice = (Math.PI*2)/den;
    for(let i=0;i<den;i++){
      const startA = -Math.PI/2 + i*slice;
      const endA = startA + slice;
      const x1 = cx + r*Math.cos(startA), y1 = cy + r*Math.sin(startA);
      const x2 = cx + r*Math.cos(endA), y2 = cy + r*Math.sin(endA);
      const fill = i < num ? fillColor : '#fff';
      paths += '<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 0 1 '+x2+','+y2+' Z" fill="'+fill+'" stroke="#2B2D42" stroke-width="2"/>';
    }
    return '<svg class="fractionShape" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+paths+'</svg>';
  }

  function buildFractionIdentify(){
    const den = choice(FRAC_DENOMS);
    const num = rand(1, den-1);
    const html =
      '<div class="fractionRow">' + fracShapeSVG(num, den, 150, '#FF6B6B') + '</div>' +
      '<div class="opLabel" style="margin-top:-8px;">What fraction is shaded?</div>';

    const answerLabel = num + '/' + den;
    const set = new Set([answerLabel]);
    let guard = 0;
    while(set.size < 4 && guard < 40){
      guard++;
      const dDen = choice(FRAC_DENOMS);
      const dNum = rand(1, dDen-1);
      const lbl = dNum+'/'+dDen;
      if(lbl !== answerLabel) set.add(lbl);
    }
    const choices = shuffle(Array.from(set)).map(l => ({label: l, value: l}));

    return {kind:'fraction', answer: answerLabel, html, choices};
  }

  function buildFractionCompare(){
    // same denominator or same numerator, per grade-3 scope
    const sameDen = Math.random() < 0.5;
    let n1, d1, n2, d2;
    if(sameDen){
      const denOptions = FRAC_DENOMS.filter(d => d > 2); // need 2+ distinct numerators
      const den = choice(denOptions);
      n1 = rand(1, den-1); n2 = rand(1, den-1);
      while(n2 === n1) n2 = rand(1, den-1);
      d1 = d2 = den;
    } else {
      const num = rand(1, 4);
      const denOptions = FRAC_DENOMS.filter(d => d > num);
      d1 = choice(denOptions); d2 = choice(denOptions);
      while(d2 === d1) d2 = choice(denOptions);
      n1 = n2 = num;
    }
    const v1 = n1/d1, v2 = n2/d2;
    const answer = v1 > v2 ? '>' : (v1 < v2 ? '<' : '=');

    const html =
      '<div class="fractionRow">' +
        '<div>' + fracShapeSVG(n1, d1, 110, '#06D6A0') +
          '<div class="fractionCaption">'+n1+'/'+d1+'</div></div>' +
        '<div style="font-size:34px;align-self:center;color:#c9c2ab;">?</div>' +
        '<div>' + fracShapeSVG(n2, d2, 110, '#FFD166') +
          '<div class="fractionCaption">'+n2+'/'+d2+'</div></div>' +
      '</div>' +
      '<div class="opLabel" style="margin-top:-8px;">Which sign goes in the middle?</div>';

    const choices = shuffle(['>','<','=']).map(s => ({label:s, value:s}));
    return {kind:'fraction', answer, html, choices};
  }

  function buildFraction(){
    return Math.random() < 0.5 ? buildFractionIdentify() : buildFractionCompare();
  }

  // ---------------- Measurement word problems ----------------
  const MEAS_TEMPLATES = [
    {
      unit:'minutes', icon:'⏰',
      build:() => {
        const part1 = rand(1,8)*5;
        const part2 = rand(1,8)*5;
        return {
          text: 'Mia practiced piano for {a} minutes, then practiced violin for {b} minutes. How many minutes did she practice in total?',
          a:part1, b:part2, answer:part1+part2, unit:'minutes'
        };
      }
    },
    {
      unit:'g', icon:'⚖️',
      build:() => {
        const a = rand(2,9)*10, b = rand(2,9)*10;
        return { text:'A bag of apples weighs {a} grams. A bag of oranges weighs {b} grams. How many grams do both bags weigh together?', a, b, answer:a+b, unit:'g' };
      }
    },
    {
      unit:'kg', icon:'📦',
      build:() => {
        const a = rand(5,20), b = rand(1,a-1);
        return { text:'A box weighs {a} kilograms. {b} kilograms are taken out. How many kilograms are left in the box?', a, b, answer:a-b, unit:'kg' };
      }
    },
    {
      unit:'l', icon:'🪣',
      build:() => {
        const per = rand(2,5), groups = rand(2,6);
        return { text:'Each bucket holds {a} liters of water. There are {b} buckets. How many liters of water is that in total?', a:per, b:groups, answer:per*groups, unit:'l' };
      }
    },
    {
      unit:'minutes', icon:'🕒',
      build:() => {
        const total = rand(2,10)*5;
        const used = rand(1, total-5);
        return { text:'A recipe needs {a} minutes to bake. It has already baked for {b} minutes. How many minutes are left?', a:total, b:used, answer:total-used, unit:'minutes' };
      }
    }
  ];

  function buildMeasurement(){
    const tpl = choice(MEAS_TEMPLATES);
    const p = tpl.build();
    const text = p.text.replace('{a}', p.a).replace('{b}', p.b);
    const html =
      '<div class="wordProblem"><span class="icon">'+tpl.icon+'</span>' + text + '</div>';
    const unitSuffix = p.unit === 'minutes' ? ' min' : (' ' + p.unit);
    const choices = makeNumberChoices(p.answer).map(c => ({label: c.value + unitSuffix, value: c.value}));
    return {kind:'measurement', answer: p.answer, html, choices};
  }

  // ---------------- Statistics / graphs ----------------
  const STAT_THEMES = [
    {title:'Favorite fruit', labels:['🍎','🍌','🍇','🍓'], names:['Apple','Banana','Grape','Strawberry']},
    {title:'Pets in class', labels:['🐶','🐱','🐠','🐰'], names:['Dogs','Cats','Fish','Rabbits']},
    {title:'Favorite sport', labels:['⚽','🏀','⚾','🎾'], names:['Soccer','Basketball','Baseball','Tennis']}
  ];

  function buildStatistics(){
    const theme = choice(STAT_THEMES);
    const n = 4;
    // generate 4 distinct values so "which is most" and "how many more" are always unambiguous
    const values = [];
    while(values.length < n){
      const v = rand(2,12);
      if(!values.includes(v)) values.push(v);
    }
    const colors = ['#FF6B6B','#06D6A0','#FFD166','#EF476F'];
    const maxVal = Math.max(...values);

    let bars = '';
    for(let i=0;i<n;i++){
      const heightPct = Math.round((values[i]/maxVal)*100);
      bars +=
        '<div class="barCol">' +
          '<div class="barVal">'+values[i]+'</div>' +
          '<div class="barFill" style="height:'+heightPct+'%; background:'+colors[i]+';"></div>' +
          '<div class="barLabel">'+theme.labels[i]+'<br>'+theme.names[i]+'</div>' +
        '</div>';
    }

    // question types
    const qType = choice(['most','total','diff','howmany']);
    let questionText, answer;
    const iMax = values.indexOf(maxVal);
    if(qType === 'most'){
      questionText = 'Which was picked the most?';
      answer = theme.names[iMax];
    } else if(qType === 'total'){
      questionText = 'How many votes were there in total?';
      answer = values.reduce((s,v)=>s+v,0);
    } else if(qType === 'howmany'){
      const i = rand(0,n-1);
      questionText = 'How many people picked ' + theme.names[i] + '?';
      answer = values[i];
    } else {
      let i1 = rand(0,n-1), i2 = rand(0,n-1);
      while(i2 === i1) i2 = rand(0,n-1);
      const hi = values[i1] > values[i2] ? i1 : i2;
      const lo = hi === i1 ? i2 : i1;
      questionText = 'How many more people picked ' + theme.names[hi] + ' than ' + theme.names[lo] + '?';
      answer = values[hi] - values[lo];
    }

    const html =
      '<div class="chartWrap">' +
        '<div class="chartTitle">'+theme.title+'</div>' +
        '<div class="barRow">'+bars+'</div>' +
      '</div>' +
      '<div class="opLabel" style="margin-top:-8px;">'+questionText+'</div>';

    let choices;
    if(qType === 'most'){
      choices = shuffle(theme.names.slice()).map(nm => ({label:nm, value:nm}));
    } else {
      choices = makeNumberChoices(answer);
    }

    return {kind:'statistics', answer, html, choices};
  }

  // ================= YEAR 3 GENERATORS =================

  // Render an H/T/O place value chart as counters (caps at a readable count per cell)
  function pvChartHTML(hundreds, tens, ones){
    function cell(count, cls, label){
      let dots = '';
      const shown = Math.min(count, 9);
      for(let i=0;i<shown;i++){
        dots += '<div class="pvCounter '+cls+'">'+(cls==='h'?100:cls==='t'?10:1)+'</div>';
      }
      return '<div class="pvCol"><div class="pvColHead '+cls+'">'+label+'</div><div class="pvColBody">'+dots+'</div></div>';
    }
    return '<div class="pvChart">' +
      cell(hundreds,'h','H') +
      cell(tens,'t','T') +
      cell(ones,'o','O') +
      '</div>';
  }

  // ---- Place value: column addition/subtraction (no exchange) ----
  function buildPlaceValueColumn(){
    const isAdd = Math.random() < 0.5;
    let a, b, answer;
    if(isAdd){
      const aH = rand(1,8), aT = rand(0,8), aO = rand(0,8);
      const bH = rand(0, 9-aH), bT = rand(0, 9-aT), bO = rand(0, 9-aO);
      a = aH*100+aT*10+aO; b = bH*100+bT*10+bO;
      answer = a+b;
    } else {
      const aH = rand(2,9), aT = rand(2,9), aO = rand(2,9);
      a = aH*100+aT*10+aO;
      const bH = rand(0,aH), bT = rand(0,aT), bO = rand(0,aO);
      b = bH*100+bT*10+bO;
      answer = a-b;
    }
    const sym = isAdd ? '+' : '−';
    const aStr = String(a).padStart(3,'0').split('');
    const bStr = String(b).padStart(3,'0').split('');

    const html =
      '<div class="colGrid"><table class="colTable"><tr>' +
        '<td></td><td>'+aStr[0]+'</td><td>'+aStr[1]+'</td><td>'+aStr[2]+'</td>' +
      '</tr><tr>' +
        '<td class="opCell">'+sym+'</td><td>'+bStr[0]+'</td><td>'+bStr[1]+'</td><td>'+bStr[2]+'</td>' +
      '</tr><tr class="ruleRow"><td></td><td></td><td></td><td></td></tr><tr>' +
        '<td></td><td class="missing">?</td><td class="missing">?</td><td class="missing">?</td>' +
      '</tr></table></div>';

    return {kind:'pv', op:'pv', answer, html, choices: makeNumberChoices(answer)};
  }

  // ---- Place value: missing digit sentence, e.g. 376 + _ = 380 ----
  function buildPlaceValueMissingDigit(){
    const templates = [
      () => {
        const result = rand(20,90)*10;
        const add = rand(1,9);
        const base = result - add;
        return {a: base, op:'+', result, missing: add};
      },
      () => {
        const base = rand(20,90)*10 + rand(1,9);
        const sub = rand(1,9);
        return {a: base, op:'−', result: base-sub, missing: sub};
      }
    ];
    const t = choice(templates)();

    const html =
      '<div class="digitSentence">' +
        t.a + ' ' + t.op + ' <span class="blank">?</span> = ' + t.result +
      '</div>';

    return {kind:'pv', op:'pv', answer: t.missing, html, choices: makeNumberChoices(t.missing)};
  }

  // ---- Place value: complete the sentence, e.g. "500 more than 238 is ___" ----
  function buildPlaceValueSentence(){
    function moreVariant(){
      const base = rand(100,800);
      const step = choice([10,20,30,50,100,200,300]);
      return {text: step + ' more than ' + base + ' is equal to', answer: base+step};
    }
    function lessVariant(){
      const base = rand(200,900);
      const step = choice([10,20,30,50,100,200]);
      if(step >= base) return null;
      return {text: step + ' less than ' + base + ' is equal to', answer: base-step};
    }
    let v = null;
    while(!v) v = Math.random() < 0.5 ? moreVariant() : lessVariant();

    const html = '<div class="wordProblem"><span class="icon">🔢</span>' + v.text + ' ___?</div>';
    return {kind:'pv', op:'pv', answer: v.answer, html, choices: makeNumberChoices(v.answer)};
  }

  function buildPlaceValue(){
    const r = Math.random();
    if(r < 0.4) return buildPlaceValueColumn();
    if(r < 0.75) return buildPlaceValueMissingDigit();
    return buildPlaceValueSentence();
  }

  // ---- Multiples of 2, 5, 10 ----
  function buildMultiples(){
    const target = choice([2,5,10]);
    const qType = choice(['identify','count']);

    if(qType === 'identify'){
      const isMultiple = Math.random() < 0.5;
      let n;
      if(isMultiple){
        n = target * rand(2, 60);
      } else {
        do { n = rand(2, 600); } while(n % target === 0);
      }
      const html =
        '<div class="digitSentence" style="font-size:min(16vw,64px);">' + n + '</div>' +
        '<div class="opLabel" style="margin-top:-8px;">Is ' + n + ' a multiple of ' + target + '?</div>';
      const answer = isMultiple ? 'Yes' : 'No';
      const choices = shuffle(['Yes','No']).map(v => ({label:v, value:v}));
      return {kind:'multi', op:'multi', answer, html, choices};
    } else {
      const n = rand(2, 20);
      const answer = target * n;
      const html =
        '<div class="opLabel" style="margin-bottom:10px;">What is ' + n + ' × ' + target + '?</div>' +
        '<div class="digitSentence" style="font-size:min(16vw,56px);">' + n + ' × ' + target + ' = ?</div>';
      return {kind:'multi', op:'multi', answer, html, choices: makeNumberChoices(answer)};
    }
  }

  // ---- 3 times table: facts, missing factor, division facts ----
  function buildTimesTable3(){
    const qType = choice(['mult','missingFactor','div']);
    if(qType === 'mult'){
      const n = rand(1,12);
      const answer = n*3;
      const html = '<div class="digitSentence">' + n + ' × 3 = <span class="blank">?</span></div>';
      return {kind:'t3', op:'t3', answer, html, choices: makeNumberChoices(answer)};
    } else if(qType === 'missingFactor'){
      const n = rand(1,12);
      const product = n*3;
      const html = '<div class="digitSentence">3 × <span class="blank">?</span> = ' + product + '</div>';
      return {kind:'t3', op:'t3', answer: n, html, choices: makeNumberChoices(n)};
    } else {
      const n = rand(1,12);
      const product = n*3;
      const html = '<div class="digitSentence">' + product + ' ÷ 3 = <span class="blank">?</span></div>';
      return {kind:'t3', op:'t3', answer: n, html, choices: makeNumberChoices(n)};
    }
  }

  // ---- Sharing vs grouping word problems (division) ----
  const SHARE_GROUP_TEMPLATES = [
    {
      icon:'🍪',
      build:() => {
        const groups = choice([2,3,4,5]);
        const each = rand(2,9);
        const total = groups*each;
        return {text:'Mo has '+total+' cookies. He shares them equally into '+groups+' bags. How many cookies are in each bag?', answer: each};
      }
    },
    {
      icon:'📦',
      build:() => {
        const each = choice([2,3,5,10]);
        const groups = rand(2,9);
        const total = each*groups;
        return {text:'There are '+total+' apples. Each box holds '+each+' apples. How many boxes can be filled?', answer: groups};
      }
    },
    {
      icon:'🎈',
      build:() => {
        const groups = choice([2,3,4]);
        const each = rand(3,9);
        const total = groups*each;
        return {text:'There are '+total+' balloons shared equally between '+groups+' party bags. How many balloons go in each bag?', answer: each};
      }
    },
    {
      icon:'🧃',
      build:() => {
        const each = choice([3,5,10]);
        const groups = rand(2,9);
        const total = each*groups;
        return {text:'A shop has '+total+' juice boxes. They come in packs of '+each+'. How many packs are there?', answer: groups};
      }
    }
  ];

  function buildSharingGrouping(){
    const tpl = choice(SHARE_GROUP_TEMPLATES);
    const p = tpl.build();
    const html = '<div class="wordProblem"><span class="icon">'+tpl.icon+'</span>' + p.text + '</div>';
    return {kind:'dvy3', op:'dvy3', answer: p.answer, html, choices: makeNumberChoices(p.answer)};
  }

  // ---- Year 3 fractions: add/subtract fractions with the SAME denominator (bar model) ----
  function fractionBarHTML(den, filledA, filledB, color1, color2){
    let cells = '';
    for(let i=0;i<den;i++){
      let fill = '#fff';
      if(i < filledA) fill = color1;
      else if(i < filledA+filledB) fill = color2;
      cells += '<div style="flex:1;height:44px;border:2px solid #2B2D42;background:'+fill+';"></div>';
    }
    return '<div style="display:flex;width:100%;max-width:380px;margin:0 auto 16px;border-radius:10px;overflow:hidden;border:2px solid #2B2D42;">' + cells + '</div>';
  }

  function buildFractionY3(){
    const isAdd = Math.random() < 0.5;
    const den = choice([4,5,6,7,8,9,10]);

    if(isAdd){
      const n1 = rand(1, den-2);
      const maxN2 = den - n1;
      const n2 = rand(1, Math.max(1, maxN2-1));
      const sumNum = n1 + n2;
      const bar = fractionBarHTML(den, n1, n2, '#FF6B6B', '#FFD166');
      const html =
        bar +
        '<div class="digitSentence" style="font-size:min(10vw,38px);">' +
          '<sup>'+n1+'</sup>⁄<sub>'+den+'</sub> + <sup>'+n2+'</sup>⁄<sub>'+den+'</sub> = <span class="blank">?</span>' +
        '</div>';
      const answerLabel = sumNum + '/' + den;
      const set = new Set([answerLabel]);
      let guard=0;
      while(set.size < 4 && guard < 30){
        guard++;
        const fakeNum = rand(1, den-1);
        if(fakeNum !== sumNum) set.add(fakeNum+'/'+den);
      }
      const choices = shuffle(Array.from(set)).map(l => ({label:l, value:l}));
      return {kind:'fracy3', op:'fracy3', answer: answerLabel, html, choices};
    } else {
      const n1 = rand(2, den-1);
      const n2 = rand(1, n1-1);
      const diff = n1-n2;
      const bar2 = fractionBarHTML(den, diff, n2, '#06D6A0', '#EADFC8');
      const html =
        bar2 +
        '<div class="digitSentence" style="font-size:min(10vw,38px);">' +
          '<sup>'+n1+'</sup>⁄<sub>'+den+'</sub> − <sup>'+n2+'</sup>⁄<sub>'+den+'</sub> = <span class="blank">?</span>' +
        '</div>';
      const answerLabel = diff + '/' + den;
      const set = new Set([answerLabel]);
      let guard=0;
      while(set.size < 4 && guard < 30){
        guard++;
        const fakeNum = rand(1, den-1);
        if(fakeNum !== diff) set.add(fakeNum+'/'+den);
      }
      const choices = shuffle(Array.from(set)).map(l => ({label:l, value:l}));
      return {kind:'fracy3', op:'fracy3', answer: answerLabel, html, choices};
    }
  }
  // kept as buildFractionAddSub going forward; buildFractionY3 name retained
  // as an alias below so nothing else in the file needs to change.
  const buildFractionAddSub = buildFractionY3;

  // ---- Fractions+ rebuild (Y3 Spring Block 3 + Summer Block 1, full set) ----

  const FRAC_DENOMS_BASIC = [2,3,4,5,6,8,10];

  // bar split into `den` cells, first `num` filled (rendered as inline-flex divs,
  // matching the existing fractionBarHTML style/sizing used by buildFractionY3)
  function fracBarDivHTML(num, den, fillColor, w){
    w = w || 280;
    let cells = '';
    for(let i=0;i<den;i++){
      const fill = i < num ? fillColor : '#fff';
      cells += '<div style="flex:1;height:44px;border:2px solid #2B2D42;background:'+fill+';"></div>';
    }
    return '<div style="display:flex;width:'+w+'px;max-width:'+w+'px;margin:0 auto;border-radius:10px;overflow:hidden;border:2px solid #2B2D42;">' + cells + '</div>';
  }

  // a shape divided into parts, some EQUAL some NOT, for the "is this split
  // into equal parts?" identification question.
  function rectSplitSVG(n, equal){
    const w = 160, h = 100;
    let cuts = '';
    if(equal){
      const cellW = w/n;
      for(let i=1;i<n;i++){
        cuts += '<line x1="'+(i*cellW)+'" y1="0" x2="'+(i*cellW)+'" y2="'+h+'" stroke="#2B2D42" stroke-width="2"/>';
      }
    } else {
      let cutPositions = [];
      let guard=0;
      while(cutPositions.length < n-1 && guard < 50){
        guard++;
        const p = rand(15, w-15);
        const cellW = w/n;
        let tooClose = false;
        for(let i=1;i<n;i++){ if(Math.abs(p - i*cellW) < 12) tooClose = true; }
        if(!tooClose && !cutPositions.some(c=>Math.abs(c-p)<15)) cutPositions.push(p);
      }
      cutPositions.sort((a,b)=>a-b);
      cutPositions.forEach(p => {
        cuts += '<line x1="'+p+'" y1="0" x2="'+p+'" y2="'+h+'" stroke="#2B2D42" stroke-width="2"/>';
      });
    }
    return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'"><rect x="0" y="0" width="'+w+'" height="'+h+'" fill="#FFD166" stroke="#2B2D42" stroke-width="2"/>'+cuts+'</svg>';
  }

  function pieSplitSVG(n, equal){
    const size = 140;
    const cx = size/2, cy = size/2, r = size/2-6;
    let lines = '';
    if(equal){
      const slice = (Math.PI*2)/n;
      for(let i=0;i<n;i++){
        const a = -Math.PI/2 + i*slice;
        lines += '<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a))+'" y2="'+(cy+r*Math.sin(a))+'" stroke="#2B2D42" stroke-width="2"/>';
      }
    } else {
      let angles = [];
      let guard=0;
      const evenSlice = (Math.PI*2)/n;
      while(angles.length < n && guard < 50){
        guard++;
        const a = Math.random()*Math.PI*2;
        const tooClose = angles.some(x => Math.abs(x-a) < 0.35) ||
          Array.from({length:n}, (_,i)=> -Math.PI/2 + i*evenSlice).some(ev => Math.abs(((a-ev+Math.PI)%(2*Math.PI))-Math.PI) < 0.25);
        if(!tooClose) angles.push(a);
      }
      angles.forEach(a => {
        lines += '<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a))+'" y2="'+(cy+r*Math.sin(a))+'" stroke="#2B2D42" stroke-width="2"/>';
      });
    }
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#8FD3C7" stroke="#2B2D42" stroke-width="2"/>'+lines+'</svg>';
  }

  const SPLIT_SHAPES = [
    {isEqual:true,  build:()=>rectSplitSVG(4, true)},
    {isEqual:true,  build:()=>rectSplitSVG(3, true)},
    {isEqual:true,  build:()=>rectSplitSVG(6, true)},
    {isEqual:true,  build:()=>pieSplitSVG(3, true)},
    {isEqual:true,  build:()=>pieSplitSVG(4, true)},
    {isEqual:false, build:()=>rectSplitSVG(4, false)},
    {isEqual:false, build:()=>rectSplitSVG(3, false)},
    {isEqual:false, build:()=>pieSplitSVG(3, false)},
    {isEqual:false, build:()=>pieSplitSVG(4, false)}
  ];

  // ---- 1. Is this shape split into equal parts? ----
  function buildSplitEqualCheck(){
    const item = choice(SPLIT_SHAPES);
    const svg = item.build();
    const html =
      '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
      '<div class="opLabel">Is this shape split into equal parts?</div>';
    const answer = item.isEqual ? 'Yes' : 'No';
    const choices = shuffle(['Yes','No']).map(v => ({label:v, value:v}));
    return {kind:'fracy3', op:'fracy3', answer, html, choices};
  }

  // ---- 2. Identify the shaded fraction (unit or non-unit) ----
  function buildIdentifyShaded(){
    const den = choice(FRAC_DENOMS_BASIC);
    const unitOnly = Math.random() < 0.4;
    const num = unitOnly ? 1 : rand(1, den-1);
    const useBar = Math.random() < 0.5;
    const svg = useBar ? fracBarDivHTML(num, den, '#06D6A0', 240) : fracShapeSVG(num, den, 150, '#FF6B6B');

    const html =
      '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
      '<div class="opLabel">What fraction is shaded?</div>';

    const answerLabel = num + '/' + den;
    const set = new Set([answerLabel]);
    let guard=0;
    while(set.size < 4 && guard < 40){
      guard++;
      const dDen = choice(FRAC_DENOMS_BASIC);
      const dNum = rand(1, dDen-1);
      const lbl = dNum+'/'+dDen;
      if(lbl !== answerLabel) set.add(lbl);
    }
    const choices = shuffle(Array.from(set)).map(l => ({label:l, value:l}));
    return {kind:'fracy3', op:'fracy3', answer: answerLabel, html, choices};
  }

  // ---- 3. Compare unit fractions (different denominators) ----
  function buildCompareUnitFractions(){
    const denOptions = FRAC_DENOMS_BASIC.filter(d => d > 1);
    let d1 = choice(denOptions), d2 = choice(denOptions);
    while(d2 === d1) d2 = choice(denOptions);
    const v1 = 1/d1, v2 = 1/d2;
    const answer = v1 > v2 ? '>' : (v1 < v2 ? '<' : '=');

    const html =
      '<div class="digitSentence" style="font-size:min(11vw,40px);">' +
        '<sup>1</sup>⁄<sub>'+d1+'</sub> <span class="blank">?</span> <sup>1</sup>⁄<sub>'+d2+'</sub>' +
      '</div>' +
      '<div class="opLabel">Which sign goes in the middle?</div>';

    const choices = shuffle(['>','<','=']).map(s => ({label:s, value:s}));
    return {kind:'fracy3', op:'fracy3', answer, html, choices};
  }

  // ---- 4. Compare non-unit fractions (same denom or same numerator) ----
  function buildCompareNonUnitFractions(){
    const sameDen = Math.random() < 0.5;
    let n1, d1, n2, d2;
    if(sameDen){
      const denOptions = FRAC_DENOMS_BASIC.filter(d => d > 2);
      const den = choice(denOptions);
      n1 = rand(1, den-1); n2 = rand(1, den-1);
      while(n2 === n1) n2 = rand(1, den-1);
      d1 = d2 = den;
    } else {
      const num = rand(2, 4);
      const denOptions = FRAC_DENOMS_BASIC.filter(d => d > num);
      d1 = choice(denOptions); d2 = choice(denOptions);
      while(d2 === d1) d2 = choice(denOptions);
      n1 = n2 = num;
    }
    const v1 = n1/d1, v2 = n2/d2;
    const answer = v1 > v2 ? '>' : (v1 < v2 ? '<' : '=');

    const html =
      '<div class="fractionRow">' +
        '<div>' + fracShapeSVG(n1, d1, 110, '#06D6A0') +
          '<div class="fractionCaption">'+n1+'/'+d1+'</div></div>' +
        '<div style="font-size:34px;align-self:center;color:#c9c2ab;">?</div>' +
        '<div>' + fracShapeSVG(n2, d2, 110, '#FFD166') +
          '<div class="fractionCaption">'+n2+'/'+d2+'</div></div>' +
      '</div>' +
      '<div class="opLabel" style="margin-top:-8px;">Which sign goes in the middle?</div>';

    const choices = shuffle(['>','<','=']).map(s => ({label:s, value:s}));
    return {kind:'fracy3', op:'fracy3', answer, html, choices};
  }

  // ---- number line SVG with fraction tick labels ----
  function numberLineSVG(numTicks, marks, blankIndex){
    const w = 320, h = 70;
    const padL = 18, padR = 18;
    const lineY = 30;
    const usableW = w - padL - padR;

    function xFor(i){ return padL + (i/numTicks)*usableW; }

    let ticks = '';
    for(let i=0;i<=numTicks;i++){
      const x = xFor(i);
      ticks += '<line x1="'+x+'" y1="'+(lineY-8)+'" x2="'+x+'" y2="'+(lineY+8)+'" stroke="#2B2D42" stroke-width="2"/>';
    }
    let labels = '';
    marks.forEach((m, idx) => {
      const x = xFor(m.tickIndex);
      if(idx === blankIndex){
        labels += '<rect x="'+(x-16)+'" y="'+(lineY+14)+'" width="32" height="22" rx="4" fill="#fff" stroke="#EADFC8" stroke-width="2" stroke-dasharray="3,2"/>' +
          '<text x="'+x+'" y="'+(lineY+30)+'" font-size="13" font-family="Baloo 2" font-weight="700" fill="#E85555" text-anchor="middle">?</text>';
      } else if(m.label !== null){
        labels += '<text x="'+x+'" y="'+(lineY+28)+'" font-size="12" font-family="Quicksand" font-weight="700" fill="#2B2D42" text-anchor="middle">'+m.label+'</text>';
      }
    });

    return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">' +
      '<line x1="'+padL+'" y1="'+lineY+'" x2="'+(w-padR)+'" y2="'+lineY+'" stroke="#2B2D42" stroke-width="2.5"/>' +
      ticks + labels +
      '</svg>';
  }

  // ---- 5. Count in fractions on a number line (fill the blank) ----
  function buildNumberLineCount(){
    const den = choice([2,3,4,5,6,8,10]);
    const totalTicks = den;
    const marks = [];
    for(let i=0;i<=totalTicks;i++){
      marks.push({tickIndex:i, label: i===0 ? '0' : (i+'/'+den)});
    }
    const blankIdx = rand(1, marks.length-1);
    const answerNum = blankIdx;
    const svg = numberLineSVG(totalTicks, marks, blankIdx);

    const html =
      '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
      '<div class="opLabel">What fraction goes in the box?</div>';

    const answerLabel = answerNum + '/' + den;
    const set = new Set([answerLabel]);
    let guard=0;
    while(set.size < 4 && guard < 30){
      guard++;
      let fakeNum = answerNum + choice([-2,-1,1,2]);
      if(fakeNum < 0 || fakeNum > den) fakeNum = rand(0, den);
      set.add(fakeNum + '/' + den);
    }
    const choices = shuffle(Array.from(set)).map(l => ({label:l, value:l}));
    return {kind:'fracy3', op:'fracy3', answer: answerLabel, html, choices};
  }

  // ---- 6. Equivalent fractions on a number line ----
  function dualNumberLineSVG(denA, numA, denB, blankOnB){
    const w = 320, h = 110;
    const padL = 18, padR = 18;
    const usableW = w - padL - padR;
    const lineYA = 25, lineYB = 80;

    function xForA(i){ return padL + (i/denA)*usableW; }
    function xForB(i){ return padL + (i/denB)*usableW; }

    let ticksA = '', labelsA = '';
    for(let i=0;i<=denA;i++){
      const x = xForA(i);
      ticksA += '<line x1="'+x+'" y1="'+(lineYA-7)+'" x2="'+x+'" y2="'+(lineYA+7)+'" stroke="#2B2D42" stroke-width="2"/>';
      if(i===0) labelsA += '<text x="'+x+'" y="'+(lineYA-12)+'" font-size="11" font-family="Quicksand" font-weight="700" text-anchor="middle">0</text>';
      if(i===numA) labelsA += '<text x="'+x+'" y="'+(lineYA-12)+'" font-size="11" font-family="Quicksand" font-weight="700" fill="#E85555" text-anchor="middle">'+numA+'/'+denA+'</text>';
    }
    let ticksB = '', labelsB = '';
    const numB = (numA/denA)*denB;
    for(let i=0;i<=denB;i++){
      const x = xForB(i);
      ticksB += '<line x1="'+x+'" y1="'+(lineYB-7)+'" x2="'+x+'" y2="'+(lineYB+7)+'" stroke="#2B2D42" stroke-width="2"/>';
      if(i===0) labelsB += '<text x="'+x+'" y="'+(lineYB+22)+'" font-size="11" font-family="Quicksand" font-weight="700" text-anchor="middle">0</text>';
    }
    if(blankOnB){
      const x = xForB(numB);
      labelsB += '<rect x="'+(x-15)+'" y="'+(lineYB+10)+'" width="30" height="20" rx="4" fill="#fff" stroke="#EADFC8" stroke-width="2" stroke-dasharray="3,2"/>' +
        '<text x="'+x+'" y="'+(lineYB+25)+'" font-size="12" font-family="Baloo 2" font-weight="700" fill="#E85555" text-anchor="middle">?</text>';
    }

    return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">' +
      '<line x1="'+padL+'" y1="'+lineYA+'" x2="'+(w-padR)+'" y2="'+lineYA+'" stroke="#2B2D42" stroke-width="2.5"/>' +
      ticksA + labelsA +
      '<line x1="'+padL+'" y1="'+lineYB+'" x2="'+(w-padR)+'" y2="'+lineYB+'" stroke="#2B2D42" stroke-width="2.5"/>' +
      ticksB + labelsB +
      '<line x1="'+xForA(numA)+'" y1="'+(lineYA+7)+'" x2="'+xForB(numB)+'" y2="'+(lineYB-7)+'" stroke="#c9c2ab" stroke-width="1.5" stroke-dasharray="3,3"/>' +
      '</svg>';
  }

  function buildEquivalentNumberLine(){
    const denA = choice([2,3,4,5]);
    const multiplier = choice([2,3,4].filter(m => denA*m <= 12));
    const denB = denA * multiplier;
    const numA = rand(1, denA-1);
    const numB = numA * multiplier;

    const svg = dualNumberLineSVG(denA, numA, denB, true);
    const html =
      '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
      '<div class="opLabel">'+numA+'/'+denA+' is equivalent to what, out of '+denB+'?</div>';

    const answerLabel = numB + '/' + denB;
    const set = new Set([answerLabel]);
    let guard=0;
    while(set.size < 4 && guard < 30){
      guard++;
      let fakeNum = numB + choice([-2,-1,1,2]);
      if(fakeNum < 1 || fakeNum >= denB) fakeNum = rand(1, denB-1);
      set.add(fakeNum + '/' + denB);
    }
    const choices = shuffle(Array.from(set)).map(l => ({label:l, value:l}));
    return {kind:'fracy3', op:'fracy3', answer: answerLabel, html, choices};
  }

  // ---- 7. Equivalent fractions as bar models ----
  function dualBarHTML(numA, denA, denB){
    const numB = (numA/denA)*denB;
    const barA = fracBarDivHTML(numA, denA, '#FF6B6B', 260);
    const barB = fracBarDivHTML(numB, denB, '#FFD166', 260);
    return '<div style="display:flex;flex-direction:column;gap:8px;align-items:center;">' + barA + barB + '</div>';
  }

  function buildEquivalentBarModel(){
    const denA = choice([2,3,4,5]);
    const multiplier = choice([2,3,4].filter(m => denA*m <= 12));
    const denB = denA * multiplier;
    const numA = rand(1, denA-1);
    const numB = numA * multiplier;

    const svg = dualBarHTML(numA, denA, denB);
    const html =
      '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
      '<div class="opLabel">'+numA+'/'+denA+' = ?/'+denB+'</div>';

    const answerLabel = numB + '/' + denB;
    const set = new Set([answerLabel]);
    let guard=0;
    while(set.size < 4 && guard < 30){
      guard++;
      let fakeNum = numB + choice([-2,-1,1,2]);
      if(fakeNum < 1 || fakeNum >= denB) fakeNum = rand(1, denB-1);
      set.add(fakeNum + '/' + denB);
    }
    const choices = shuffle(Array.from(set)).map(l => ({label:l, value:l}));
    return {kind:'fracy3', op:'fracy3', answer: answerLabel, html, choices};
  }

  // ---- 8. Partition the whole / understand the whole ----
  function buildPartitionWhole(){
    const den = choice([2,3,4,5,6,8]);
    const num = rand(1, den-1);
    const qType = choice(['findDen','findNum','findFraction']);

    const svg = fracBarDivHTML(num, den, '#06D6A0', 240);
    let promptText, answer, choicesSrc;

    if(qType === 'findDen'){
      promptText = 'The whole is split into how many equal parts?';
      answer = den;
      choicesSrc = makeNumberChoices(answer);
    } else if(qType === 'findNum'){
      promptText = 'How many parts are shaded?';
      answer = num;
      choicesSrc = makeNumberChoices(answer);
    } else {
      promptText = 'What fraction is shaded?';
      answer = num + '/' + den;
      const set = new Set([answer]);
      let guard=0;
      while(set.size < 4 && guard < 40){
        guard++;
        const fakeDen = choice(FRAC_DENOMS_BASIC);
        const fakeNum = rand(1, fakeDen-1);
        const lbl = fakeNum+'/'+fakeDen;
        if(lbl !== answer) set.add(lbl);
      }
      choicesSrc = shuffle(Array.from(set)).map(l => ({label:l, value:l}));
    }

    const html =
      '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
      '<div class="opLabel">' + promptText + '</div>';

    return {kind:'fracy3', op:'fracy3', answer, html, choices: choicesSrc};
  }

  // ---- dot-grid SVG for "fraction of a set" questions ----
  function dotGridSVG(total, perRow){
    perRow = perRow || Math.min(total, 8);
    const dotR = 9, gap = 24;
    const rows = Math.ceil(total/perRow);
    const w = perRow*gap + 10;
    const h = rows*gap + 10;
    let dots = '';
    for(let i=0;i<total;i++){
      const row = Math.floor(i/perRow), col = i%perRow;
      const cx = 15 + col*gap, cy = 15 + row*gap;
      dots += '<circle cx="'+cx+'" cy="'+cy+'" r="'+dotR+'" fill="#8FD3C7" stroke="#2B2D42" stroke-width="1.5"/>';
    }
    return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">'+dots+'</svg>';
  }

  // ---- 9. Fraction of a set (unit fractions: 1/n of total) ----
  function buildFractionOfSetUnit(){
    const den = choice([2,3,4,5,6,8,10]);
    const multiplier = rand(2,8);
    const total = den * multiplier;
    const answer = multiplier;

    const svg = dotGridSVG(total);
    const html =
      '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
      '<div class="opLabel">What is 1/'+den+' of '+total+'?</div>';

    return {kind:'fracy3', op:'fracy3', answer, html, choices: makeNumberChoices(answer)};
  }

  // ---- 10. Fraction of a set (non-unit fractions: m/n of total) ----
  function buildFractionOfSetNonUnit(){
    const den = choice([2,3,4,5,6,8,10]);
    let num = rand(2, den-1);
    if(den === 2) num = 1;
    const unitAmount = rand(2,6);
    const total = den * unitAmount;
    const answer = num * unitAmount;

    const svg = dotGridSVG(total);
    const html =
      '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
      '<div class="opLabel">What is '+num+'/'+den+' of '+total+'?</div>';

    return {kind:'fracy3', op:'fracy3', answer, html, choices: makeNumberChoices(answer)};
  }

  // ---- 11. Reasoning: given fraction of amount, find the whole ----
  function buildFractionFindWhole(){
    const den = choice([2,3,4,5,6,8]);
    const num = choice([1, rand(2,den-1)]);
    const wholeMultiplier = rand(2,9);
    const whole = den * wholeMultiplier;
    const partValue = num * wholeMultiplier;

    const html =
      '<div class="wordProblem"><span class="icon">🔢</span>' +
        num + '/' + den + ' of a number is ' + partValue + '. What is the number?' +
      '</div>';

    return {kind:'fracy3', op:'fracy3', answer: whole, html, choices: makeNumberChoices(whole)};
  }

  function buildFractionsPlus(){
    const r = Math.random();
    if(r < 0.07) return buildSplitEqualCheck();
    if(r < 0.15) return buildIdentifyShaded();
    if(r < 0.22) return buildCompareUnitFractions();
    if(r < 0.29) return buildCompareNonUnitFractions();
    if(r < 0.37) return buildNumberLineCount();
    if(r < 0.45) return buildEquivalentNumberLine();
    if(r < 0.53) return buildEquivalentBarModel();
    if(r < 0.61) return buildPartitionWhole();
    if(r < 0.74) return buildFractionOfSetUnit();
    if(r < 0.87) return buildFractionOfSetNonUnit();
    if(r < 0.94) return buildFractionFindWhole();
    return buildFractionAddSub();
  }

  // ---- Mass & Capacity (Y3 Spring Block 4) ----

  function roundToStep(v, step){ return Math.round(v/step)*step; }

  function formatMass(grams){
    if(grams >= 1000){
      const kg = Math.floor(grams/1000), g = grams%1000;
      if(g === 0) return kg + ' kg';
      return kg + ' kg ' + g + ' g';
    }
    return grams + ' g';
  }
  function formatCap(ml){
    if(ml >= 1000){
      const l = Math.floor(ml/1000), rem = ml%1000;
      if(rem === 0) return l + ' l';
      return l + ' l ' + rem + ' ml';
    }
    return ml + ' ml';
  }

  // Draw an analog scale dial. value is the displayed numeric reading (always
  // in the small unit - grams or ml), maxVal is the dial's max reading, step
  // is the spacing between labeled ticks. Sized so the dial circle and its
  // base "stand" both fit fully inside the viewBox (no clipping).
  function scaleDialSVG(value, maxVal, step, needleColor){
    needleColor = needleColor || '#EF476F';
    const r = 65;
    const outerR = r + 18;
    const standH = 16;
    const w = outerR*2 + 8;
    const h = outerR*2 + standH + 4;
    const cx = w/2, cy = outerR + 2;
    const startAngle = -90 - 135; // degrees, 0 at top, sweeping 270 total
    const sweep = 270;
    const numTicks = Math.round(maxVal/step);

    function angleForValue(v){
      const frac = v / maxVal;
      return (startAngle + frac*sweep) * Math.PI/180;
    }

    let ticks = '';
    let labels = '';
    for(let i=0;i<=numTicks;i++){
      const v = i*step;
      const a = angleForValue(v);
      const x1 = cx + r*Math.cos(a), y1 = cy + r*Math.sin(a);
      const x2 = cx + (r-8)*Math.cos(a), y2 = cy + (r-8)*Math.sin(a);
      ticks += '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#2B2D42" stroke-width="2"/>';
      const lx = cx + (r+14)*Math.cos(a), ly = cy + (r+14)*Math.sin(a);
      const labelVal = v >= 1000 ? (v/1000) : v;
      labels += '<text x="'+lx+'" y="'+ly+'" font-size="8.5" font-family="Quicksand" font-weight="700" fill="#2B2D42" text-anchor="middle" dominant-baseline="middle">'+labelVal+'</text>';
    }

    const needleAngle = angleForValue(value);
    const nx = cx + (r-14)*Math.cos(needleAngle), ny = cy + (r-14)*Math.sin(needleAngle);

    return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">' +
      '<circle cx="'+cx+'" cy="'+cy+'" r="'+outerR+'" fill="#fff" stroke="#EADFC8" stroke-width="3"/>' +
      ticks + labels +
      '<line x1="'+cx+'" y1="'+cy+'" x2="'+nx+'" y2="'+ny+'" stroke="'+needleColor+'" stroke-width="3" stroke-linecap="round"/>' +
      '<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="'+needleColor+'"/>' +
      '<rect x="'+(cx-22)+'" y="'+(h-standH-2)+'" width="44" height="'+standH+'" fill="#8FBF6B" rx="2"/>' +
      '</svg>';
  }

  // Draw a jug/beaker with tick marks and a fill level. value/maxVal are the
  // displayed numeric reading (already converted to the chosen small unit).
  function jugSVG(value, maxVal, step, fillColor){
    fillColor = fillColor || '#4FB6E8';
    const w = 110, h = 170;
    const top = 14, bottom = h - 14;
    const left = 28, right = w - 14;
    const innerH = bottom - top;
    const fillFrac = Math.max(0, Math.min(1, value/maxVal));
    const fillY = bottom - innerH*fillFrac;
    const numTicks = Math.round(maxVal/step);

    let ticks = '';
    for(let i=0;i<=numTicks;i++){
      const v = i*step;
      const y = bottom - innerH*(v/maxVal);
      ticks += '<line x1="'+left+'" y1="'+y+'" x2="'+(left+8)+'" y2="'+y+'" stroke="#2B2D42" stroke-width="1.5"/>';
      if(i === numTicks || i === 0 || i % Math.max(1,Math.round(numTicks/4)) === 0){
        const labelVal = v >= 1000 ? (v/1000) : v;
        ticks += '<text x="'+(left-4)+'" y="'+y+'" font-size="8" font-family="Quicksand" font-weight="700" fill="#2B2D42" text-anchor="end" dominant-baseline="middle">'+labelVal+'</text>';
      }
    }

    return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">' +
      '<rect x="'+left+'" y="'+fillY+'" width="'+(right-left)+'" height="'+(bottom-fillY)+'" fill="'+fillColor+'"/>' +
      '<rect x="'+left+'" y="'+top+'" width="'+(right-left)+'" height="'+(bottom-top)+'" fill="none" stroke="#2B2D42" stroke-width="2.5" rx="3"/>' +
      ticks +
      '</svg>';
  }

  // -- number line with evenly spaced ticks, optional arrow pointing at a
  // position, 0/max labeled (matches the worksheet's "Use scales" page) --
  function intervalNumberLineSVG(numIntervals, maxVal, arrowAtTick){
    const w = 300, h = 70;
    const padL = 16, padR = 16;
    const lineY = 30;
    const usableW = w - padL - padR;

    function xFor(i){ return padL + (i/numIntervals)*usableW; }

    let ticks = '';
    for(let i=0;i<=numIntervals;i++){
      const x = xFor(i);
      ticks += '<line x1="'+x+'" y1="'+(lineY-8)+'" x2="'+x+'" y2="'+(lineY+8)+'" stroke="#2B2D42" stroke-width="2"/>';
    }
    let labels =
      '<text x="'+xFor(0)+'" y="'+(lineY+26)+'" font-size="11" font-family="Quicksand" font-weight="700" text-anchor="middle">0</text>' +
      '<text x="'+xFor(numIntervals)+'" y="'+(lineY+26)+'" font-size="11" font-family="Quicksand" font-weight="700" text-anchor="middle">'+maxVal+'</text>';

    let arrow = '';
    if(arrowAtTick !== undefined && arrowAtTick !== null){
      const x = xFor(arrowAtTick);
      arrow = '<line x1="'+x+'" y1="'+(lineY-22)+'" x2="'+x+'" y2="'+(lineY-9)+'" stroke="#E85555" stroke-width="3"/>' +
        '<polygon points="'+(x-4)+','+(lineY-12)+' '+(x+4)+','+(lineY-12)+' '+x+','+(lineY-6)+'" fill="#E85555"/>';
    }

    return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">' +
      '<line x1="'+padL+'" y1="'+lineY+'" x2="'+(w-padR)+'" y2="'+lineY+'" stroke="#2B2D42" stroke-width="2.5"/>' +
      ticks + labels + arrow +
      '</svg>';
  }

  // -- 1. Use scales: read an arrow's value on a number line, or work out
  // what each interval is counting up in --
  function buildScaleIntervalReading(){
    const configs = [
      {max:100, intervals:10}, // counting in 10s
      {max:100, intervals:4},  // counting in 25s
      {max:200, intervals:10}, // counting in 20s
      {max:50, intervals:10},  // counting in 5s
      {max:1000, intervals:10} // counting in 100s
    ];
    const cfg = choice(configs);
    const intervalSize = cfg.max / cfg.intervals;
    const qType = choice(['findArrowValue','findIntervalSize']);

    if(qType === 'findArrowValue'){
      const tick = rand(1, cfg.intervals-1);
      const svg = intervalNumberLineSVG(cfg.intervals, cfg.max, tick);
      const answer = tick * intervalSize;
      const html =
        '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
        '<div class="opLabel">What number is the arrow pointing to?</div>';
      return {kind:'masscap', op:'masscap', answer, html, choices: makeNumberChoices(answer)};
    } else {
      const svg = intervalNumberLineSVG(cfg.intervals, cfg.max, null);
      const answer = intervalSize;
      const html =
        '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
        '<div class="opLabel">What is each interval counting up in?</div>';
      return {kind:'masscap', op:'masscap', answer, html, choices: makeNumberChoices(answer)};
    }
  }

  // -- 2/3. Read the scale (mass) - grams only, or mixed kg+g --
  function buildMassReadScale(){
    const useKg = Math.random() < 0.5;
    let maxVal, step, value;
    if(useKg){
      maxVal = choice([2000,3000,5000,6000]);
      step = maxVal/10;
      value = roundToStep(rand(0, maxVal), step);
    } else {
      maxVal = 1000;
      step = 100;
      value = roundToStep(rand(0, maxVal), step);
    }
    const dial = scaleDialSVG(value, maxVal, step);

    const html =
      '<div class="visualRow"><div class="visualWrap">' + dial + '</div></div>' +
      '<div class="opLabel">What mass does the scale show?</div>';

    const answerLabel = formatMass(value);
    const set = new Set([answerLabel]);
    let guard=0;
    while(set.size < 4 && guard < 30){
      guard++;
      const fakeVal = Math.max(0, roundToStep(value + choice([-2,-1,1,2])*step, step));
      set.add(formatMass(fakeVal));
    }
    const choices = shuffle(Array.from(set)).map(l => ({label:l, value:l}));
    return {kind:'masscap', op:'masscap', answer: answerLabel, html, choices};
  }

  // -- 7/8. Read the jug (capacity) - ml only, or mixed l+ml --
  function buildCapReadJug(){
    const useL = Math.random() < 0.5;
    let maxVal, step, value;
    if(useL){
      maxVal = choice([2000,3000,5000]);
      step = maxVal/10;
      value = roundToStep(rand(0, maxVal), step);
    } else {
      maxVal = 1000;
      step = 100;
      value = roundToStep(rand(0, maxVal), step);
    }
    const jug = jugSVG(value, maxVal, step);

    const html =
      '<div class="visualRow"><div class="visualWrap">' + jug + '</div></div>' +
      '<div class="opLabel">How much liquid is in the jug?</div>';

    const answerLabel = formatCap(value);
    const set = new Set([answerLabel]);
    let guard=0;
    while(set.size < 4 && guard < 30){
      guard++;
      const fakeVal = Math.max(0, roundToStep(value + choice([-2,-1,1,2])*step, step));
      set.add(formatCap(fakeVal));
    }
    const choices = shuffle(Array.from(set)).map(l => ({label:l, value:l}));
    return {kind:'masscap', op:'masscap', answer: answerLabel, html, choices};
  }

  // -- 4/9. Equivalent masses/capacities: complement to 1000, or straight
  // kg<->g / l<->ml conversion --
  function buildEquivalentUnit(){
    const isMass = Math.random() < 0.5;
    const unitBig = isMass ? 'kg' : 'l';
    const unitSmall = isMass ? 'g' : 'ml';
    const icon = isMass ? '⚖️' : '🧴';
    const qType = choice(['complement','straightConversion']);

    if(qType === 'complement'){
      const given = choice([100,150,200,250,300,400,500,600,650,700,750,800,850,900,950]);
      const missing = 1000 - given;
      const html =
        '<div class="wordProblem"><span class="icon">'+icon+'</span>' +
          given + ' ' + unitSmall + ' + ? = 1 ' + unitBig +
        '</div>';
      const unitSuffix = ' ' + unitSmall;
      const choices = makeNumberChoices(missing).map(c => ({label: c.value + unitSuffix, value: c.value}));
      return {kind:'masscap', op:'masscap', answer: missing, html, choices};
    } else {
      const wholeFirst = Math.random() < 0.5;
      if(wholeFirst){
        const wholeAmt = rand(1,9);
        const answer = wholeAmt * 1000;
        const html =
          '<div class="digitSentence" style="font-size:min(9vw,32px);">' +
            '<span class="icon">'+icon+'</span> ' + wholeAmt + ' ' + unitBig + ' = <span class="blank">?</span> ' + unitSmall +
          '</div>';
        return {kind:'masscap', op:'masscap', answer, html, choices: makeNumberChoices(answer)};
      } else {
        const wholeAmt = rand(1,9);
        const smallAmt = wholeAmt * 1000;
        const answer = wholeAmt;
        const html =
          '<div class="digitSentence" style="font-size:min(9vw,32px);">' +
            '<span class="icon">'+icon+'</span> ' + smallAmt + ' ' + unitSmall + ' = <span class="blank">?</span> ' + unitBig +
          '</div>';
        return {kind:'masscap', op:'masscap', answer, html, choices: makeNumberChoices(answer)};
      }
    }
  }

  // -- 5/10. Compare mass/capacity via a pair of dials or jugs --
  function buildCompareVisual(){
    const isMass = Math.random() < 0.5;
    const maxVal = choice([1000,2000,3000]);
    const step = maxVal/10;
    let v1 = roundToStep(rand(0,maxVal), step);
    let v2 = roundToStep(rand(0,maxVal), step);
    if(Math.random() < 0.15) v2 = v1; // occasionally force equal
    const answer = v1 > v2 ? '>' : (v1 < v2 ? '<' : '=');

    const visual1 = isMass ? scaleDialSVG(v1, maxVal, step) : jugSVG(v1, maxVal, step);
    const visual2 = isMass ? scaleDialSVG(v2, maxVal, step) : jugSVG(v2, maxVal, step);

    const html =
      '<div class="visualRow">' +
        '<div class="visualWrap">' + visual1 + '</div>' +
        '<div style="font-size:30px;align-self:center;color:#c9c2ab;">?</div>' +
        '<div class="visualWrap">' + visual2 + '</div>' +
      '</div>' +
      '<div class="opLabel">Which sign goes in the middle?</div>';

    const choices = shuffle(['>','<','=']).map(s => ({label:s, value:s}));
    return {kind:'masscap', op:'masscap', answer, html, choices};
  }

  // -- 6. Add/subtract mass in kg & g, or capacity in l & ml --
  function buildAddSubMassCap(){
    const isMass = Math.random() < 0.5;
    const isAdd = Math.random() < 0.5;
    const unit2 = isMass ? 'g' : 'ml';
    const unit1 = isMass ? 'kg' : 'l';
    const icon = isMass ? '⚖️' : '🧴';

    let aWhole, aPart, bWhole, bPart, answerWhole, answerPart;
    if(isAdd){
      aWhole = rand(1, 20); aPart = rand(0, 8)*100;
      bWhole = rand(1, 20); bPart = rand(0, Math.floor((900-aPart)/100))*100;
      answerWhole = aWhole+bWhole; answerPart = aPart+bPart;
    } else {
      aWhole = rand(5, 30); aPart = rand(0,9)*100;
      bWhole = rand(1, aWhole-1); bPart = rand(0, aPart/100)*100;
      answerWhole = aWhole-bWhole; answerPart = aPart-bPart;
    }

    const sym = isAdd ? '+' : '−';
    const aLabel = aWhole + ' ' + unit1 + ' ' + aPart + ' ' + unit2;
    const bLabel = bWhole + ' ' + unit1 + ' ' + bPart + ' ' + unit2;

    const html =
      '<div class="wordProblem"><span class="icon">'+icon+'</span>' +
        aLabel + ' ' + sym + ' ' + bLabel + ' = ?' +
      '</div>';

    const answerLabel = answerWhole + ' ' + unit1 + ' ' + answerPart + ' ' + unit2;
    const set = new Set([answerLabel]);
    let guard=0;
    while(set.size < 4 && guard < 30){
      guard++;
      const fakeWhole = Math.max(0, answerWhole + rand(-2,2));
      const fakePart = Math.max(0, Math.min(900, answerPart + rand(-200,200)));
      const lbl = fakeWhole + ' ' + unit1 + ' ' + fakePart + ' ' + unit2;
      if(lbl !== answerLabel) set.add(lbl);
    }
    const choices = shuffle(Array.from(set)).map(l => ({label:l, value:l}));
    return {kind:'masscap', op:'masscap', answer: answerLabel, html, choices};
  }

  // -- Which jug shows the target volume (visual multiple choice) --
  function buildJugTarget(){
    const scaleOpt = choice([{max:1000, step:100, unit:'ml'}, {max:5000, step:1000, unit:'ml-as-l'}]);
    const isLUnit = scaleOpt.unit === 'ml-as-l';
    const target = roundToStep(rand(scaleOpt.step, scaleOpt.max - scaleOpt.step), scaleOpt.step);
    const targetLabel = isLUnit ? formatCap(target) : (target + ' ml');

    const html =
      '<div class="opLabel" style="margin-bottom:10px;">Which jug shows ' + targetLabel + '?</div>';

    const values = new Set([target]);
    let guard = 0;
    while(values.size < 4 && guard < 30){
      guard++;
      const v = roundToStep(rand(0, scaleOpt.max), scaleOpt.step);
      if(v !== target) values.add(v);
    }
    const arr = shuffle(Array.from(values));
    const choices = arr.map(v => ({
      label: jugSVG(v, scaleOpt.max, scaleOpt.step),
      value: v,
      isHtml: true
    }));

    return {kind:'masscapVisualChoice', op:'masscap', answer: target, html, choices};
  }

  function buildMassCapacity(){
    const r = Math.random();
    if(r < 0.10) return buildScaleIntervalReading();
    if(r < 0.28) return buildMassReadScale();
    if(r < 0.46) return buildCapReadJug();
    if(r < 0.58) return buildEquivalentUnit();
    if(r < 0.72) return buildCompareVisual();
    if(r < 0.88) return buildAddSubMassCap();
    return buildJugTarget();
  }

  // ---- Shapes & Angles (Y3 Summer Block 4) ----

  const COMPASS = ['N','E','S','W'];
  const COMPASS_FULL = {N:'north', E:'east', S:'south', W:'west'};
  const TURN_STEPS = {quarter:1, half:2, 'three-quarter':3, full:4};
  const TURN_LABEL = {quarter:'a quarter turn', half:'a half turn', 'three-quarter':'a three-quarter turn', full:'a full turn'};

  // -- 1. Turns: facing X, turns Y [clockwise/anticlockwise], facing? --
  function buildTurns(){
    const startIdx = rand(0,3);
    const turnKey = choice(['quarter','half','three-quarter','full']);
    const cw = Math.random() < 0.5;
    const steps = TURN_STEPS[turnKey] * (cw ? 1 : -1);
    const endIdx = ((startIdx + steps) % 4 + 4) % 4;

    const startName = COMPASS_FULL[COMPASS[startIdx]];
    const endName = COMPASS_FULL[COMPASS[endIdx]];
    const dirWord = cw ? 'clockwise' : 'anticlockwise';

    const html =
      '<div class="wordProblem"><span class="icon">🧭</span>' +
        'A character is facing <b>' + startName + '</b>. They turn ' + TURN_LABEL[turnKey] + ' ' + dirWord + '. ' +
        'What direction are they facing now?' +
      '</div>';

    const choices = shuffle(COMPASS.slice()).map(c => ({label: COMPASS_FULL[c], value: COMPASS_FULL[c]}));
    return {kind:'shapes', op:'shapes', answer: endName, html, choices};
  }

  // -- shape outline generator: returns {svg, rightAngleCount} for a polyline shape --
  // Shapes are built on a simple grid of points so every angle is either a
  // clean right angle or a clearly non-right angle (visually obvious).
  const RIGHT_ANGLE_SHAPES = [
    { // simple L-shape, 6 right angles
      pts: [[0,0],[2,0],[2,1],[1,1],[1,2],[0,2]], rightAngles: 6
    },
    { // plus/cross-ish notch, rectangle with corner cut
      pts: [[0,0],[3,0],[3,2],[2,2],[2,1],[0,1]], rightAngles: 6
    },
    { // plain rectangle, 4 right angles
      pts: [[0,0],[3,0],[3,2],[0,2]], rightAngles: 4
    },
    { // square, 4 right angles
      pts: [[0,0],[2,0],[2,2],[0,2]], rightAngles: 4
    },
    { // T-shape, 8 right angles
      pts: [[1,0],[2,0],[2,1],[3,1],[3,2],[0,2],[0,1],[1,1]], rightAngles: 8
    },
    { // step shape, 6 right angles
      pts: [[0,0],[2,0],[2,1],[3,1],[3,3],[0,3]], rightAngles: 6
    }
  ];

  function polylineSVG(pts, opts){
    opts = opts || {};
    const scale = opts.scale || 40;
    const pad = 16;
    const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
    const w = (Math.max(...xs))*scale + pad*2;
    const h = (Math.max(...ys))*scale + pad*2;
    const pathPts = pts.map(p => (p[0]*scale+pad) + ',' + (p[1]*scale+pad)).join(' ');
    return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">' +
      '<polygon points="'+pathPts+'" fill="'+(opts.fill||'#FFD166')+'" stroke="#2B2D42" stroke-width="3" stroke-linejoin="round"/>' +
      '</svg>';
  }

  // -- 2. Count right angles in a shape --
  function buildRightAngleCount(){
    const shape = choice(RIGHT_ANGLE_SHAPES);
    const svg = polylineSVG(shape.pts, {fill:'#8FD3C7'});
    const html =
      '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
      '<div class="opLabel">How many right angles does this shape have?</div>';
    const answer = shape.rightAngles;
    return {kind:'shapes', op:'shapes', answer, html, choices: makeNumberChoices(answer)};
  }

  // -- angle-drawing helper: draws two rays from a vertex at a given angle (degrees) --
  function angleSVG(angleDeg, opts){
    opts = opts || {};
    const size = 140;
    const cx = size/2, cy = size/2 + 25;
    const len = 50;
    const baseAngle = -15; // first ray angled up-right from a centered vertex
    const a1 = baseAngle * Math.PI/180;
    const a2 = (baseAngle - angleDeg) * Math.PI/180; // subtract so angle opens upward on screen
    const x1 = cx + len*Math.cos(a1), y1 = cy + len*Math.sin(a1);
    const x2 = cx + len*Math.cos(a2), y2 = cy + len*Math.sin(a2);
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">' +
      '<line x1="'+cx+'" y1="'+cy+'" x2="'+x1+'" y2="'+y1+'" stroke="#2B2D42" stroke-width="3" stroke-linecap="round"/>' +
      '<line x1="'+cx+'" y1="'+cy+'" x2="'+x2+'" y2="'+y2+'" stroke="#2B2D42" stroke-width="3" stroke-linecap="round"/>' +
      '</svg>';
  }

  // -- 3. Compare two angles with > < = --
  function buildCompareAngles(){
    function randAngle(){
      // avoid angles within 4 degrees of 90 to keep right-angle judgement unambiguous
      let a;
      do { a = rand(15, 165); } while(Math.abs(a-90) <= 4);
      return a;
    }
    let a1 = randAngle(), a2 = randAngle();
    if(Math.random() < 0.2) a2 = a1; // occasionally force equal angles
    const answer = a1 > a2 ? '>' : (a1 < a2 ? '<' : '=');

    const html =
      '<div class="visualRow">' +
        '<div class="visualWrap">' + angleSVG(a1) + '</div>' +
        '<div style="font-size:30px;align-self:center;color:#c9c2ab;">?</div>' +
        '<div class="visualWrap">' + angleSVG(a2) + '</div>' +
      '</div>' +
      '<div class="opLabel">Which sign goes in the middle?</div>';

    const choices = shuffle(['>','<','=']).map(s => ({label:s, value:s}));
    return {kind:'shapes', op:'shapes', answer, html, choices};
  }

  // -- 4. Classify a single angle: acute / right / obtuse --
  function buildClassifyAngle(){
    const type = choice(['acute','right','obtuse']);
    let angleDeg;
    if(type === 'acute') angleDeg = rand(15,80);
    else if(type === 'right') angleDeg = 90;
    else angleDeg = rand(100,165);

    const html =
      '<div class="visualRow"><div class="visualWrap">' + angleSVG(angleDeg) + '</div></div>' +
      '<div class="opLabel">Is this angle acute, right, or obtuse?</div>';

    const choices = shuffle(['acute','right','obtuse']).map(v => ({label:v, value:v}));
    return {kind:'shapes', op:'shapes', answer: type, html, choices};
  }

  // -- line-drawing helper for horizontal/vertical/parallel/perpendicular questions --
  function lineSVG(angleDeg, opts){
    opts = opts || {};
    const size = 140;
    const cx = size/2, cy = size/2;
    const len = opts.len || 90;
    const a = angleDeg * Math.PI/180;
    const dx = (len/2)*Math.cos(a), dy = (len/2)*Math.sin(a);
    const x1 = cx-dx, y1 = cy-dy, x2 = cx+dx, y2 = cy+dy;
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">' +
      '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#2B2D42" stroke-width="4" stroke-linecap="round"/>' +
      '</svg>';
  }

  // -- 5. Horizontal / vertical / neither --
  function buildHorizVert(){
    const type = choice(['horizontal','vertical','neither']);
    let angleDeg;
    if(type === 'horizontal') angleDeg = 0;
    else if(type === 'vertical') angleDeg = 90;
    else {
      do { angleDeg = rand(10,170); } while(Math.abs(angleDeg-90) <= 8);
    }
    const html =
      '<div class="visualRow"><div class="visualWrap">' + lineSVG(angleDeg) + '</div></div>' +
      '<div class="opLabel">Is this line horizontal, vertical, or neither?</div>';
    const choices = shuffle(['horizontal','vertical','neither']).map(v => ({label:v, value:v}));
    return {kind:'shapes', op:'shapes', answer: type, html, choices};
  }

  // -- 6. Parallel / perpendicular / neither (two separate line segments) --
  function twoLinesSVG(angle1, angle2){
    const size = 140;
    const cx = size/2, cy = size/2 - 12;
    const len = 70;
    function seg(cx0, cy0, ang){
      const a = ang * Math.PI/180;
      const dx = (len/2)*Math.cos(a), dy = (len/2)*Math.sin(a);
      return [cx0-dx, cy0-dy, cx0+dx, cy0+dy];
    }
    const s1 = seg(cx, cy, angle1);
    const s2 = seg(cx, cy + 50, angle2);
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">' +
      '<line x1="'+s1[0]+'" y1="'+s1[1]+'" x2="'+s1[2]+'" y2="'+s1[3]+'" stroke="#2B2D42" stroke-width="4" stroke-linecap="round"/>' +
      '<line x1="'+s2[0]+'" y1="'+s2[1]+'" x2="'+s2[2]+'" y2="'+s2[3]+'" stroke="#EF476F" stroke-width="4" stroke-linecap="round"/>' +
      '</svg>';
  }

  function buildParallelPerp(){
    const type = choice(['parallel','perpendicular','neither']);
    const baseAngle = rand(0,179);
    let angle2;
    if(type === 'parallel') angle2 = baseAngle;
    else if(type === 'perpendicular') angle2 = baseAngle + 90;
    else {
      let diff;
      do { diff = rand(15,165); } while(Math.abs(diff-90) <= 8);
      angle2 = baseAngle + diff;
    }
    const html =
