      '<div class="visualRow"><div class="visualWrap">' + twoLinesSVG(baseAngle, angle2) + '</div></div>' +
      '<div class="opLabel">Are these two lines parallel, perpendicular, or neither?</div>';
    const choices = shuffle(['parallel','perpendicular','neither']).map(v => ({label:v, value:v}));
    return {kind:'shapes', op:'shapes', answer: type, html, choices};
  }

  // -- 7. Name the 2-D shape (regular polygon, 3-10 sides) --
  const SHAPE_NAMES = {3:'triangle',4:'square',5:'pentagon',6:'hexagon',7:'heptagon',8:'octagon',9:'nonagon',10:'decagon'};

  function regularPolygonSVG(sides, fillColor){
    const size = 140;
    const cx = size/2, cy = size/2, r = size/2 - 14;
    let pts = [];
    for(let i=0;i<sides;i++){
      const a = -Math.PI/2 + i*(2*Math.PI/sides);
      pts.push((cx+r*Math.cos(a)) + ',' + (cy+r*Math.sin(a)));
    }
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">' +
      '<polygon points="'+pts.join(' ')+'" fill="'+fillColor+'" stroke="#2B2D42" stroke-width="3" stroke-linejoin="round"/>' +
      '</svg>';
  }

  function buildShapeNaming(){
    const sides = rand(3,10);
    const colors = ['#FF6B6B','#06D6A0','#FFD166','#4FB6E8','#EF476F','#8FD3C7'];
    const svg = regularPolygonSVG(sides, choice(colors));
    const html =
      '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
      '<div class="opLabel">What is the name of this shape?</div>';

    const answer = SHAPE_NAMES[sides];
    const distractorSides = new Set([sides]);
    let guard=0;
    while(distractorSides.size < 4 && guard < 30){
      guard++;
      distractorSides.add(rand(3,10));
    }
    const choices = shuffle(Array.from(distractorSides)).map(s => ({label: SHAPE_NAMES[s], value: SHAPE_NAMES[s]}));
    return {kind:'shapes', op:'shapes', answer, html, choices};
  }

  // -- 8. Ruler measuring (free-text answer, kind:'textinput') --
  // Draws a 0-15cm ruler with a line segment above it starting at a random
  // offset (not always 0, per the worksheet's "watch the start point" trap)
  // and ending at a whole or half-cm mark.
  function rulerSVG(startCm, endCm){
    const w = 360, h = 150;
    const padL = 20, padR = 20;
    const rulerY = 95, rulerH = 40;
    const usableW = w - padL - padR;
    const pxPerCm = usableW / 15;

    function xFor(cm){ return padL + cm*pxPerCm; }

    let ticks = '';
    for(let mm=0; mm<=150; mm++){
      const cmPos = mm/10;
      const x = xFor(cmPos);
      const isCm = mm % 10 === 0;
      const isHalf = mm % 5 === 0;
      const tickH = isCm ? 22 : (isHalf ? 15 : 9);
      ticks += '<line x1="'+x+'" y1="'+rulerY+'" x2="'+x+'" y2="'+(rulerY+tickH)+'" stroke="#2B2D42" stroke-width="'+(isCm?1.6:1)+'"/>';
      if(isCm){
        ticks += '<text x="'+x+'" y="'+(rulerY+tickH+12)+'" font-size="11" font-family="Quicksand" font-weight="700" fill="#2B2D42" text-anchor="middle">'+cmPos+'</text>';
      }
    }

    const lineY = 60;
    const x1 = xFor(startCm), x2 = xFor(endCm);

    return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">' +
      '<rect x="'+padL+'" y="'+rulerY+'" width="'+usableW+'" height="'+rulerH+'" fill="#FFF3D6" stroke="#2B2D42" stroke-width="2" rx="3"/>' +
      ticks +
      '<line x1="'+x1+'" y1="'+lineY+'" x2="'+x2+'" y2="'+lineY+'" stroke="#EF476F" stroke-width="5" stroke-linecap="round"/>' +
      '<line x1="'+x1+'" y1="'+(lineY-8)+'" x2="'+x1+'" y2="'+(lineY+8)+'" stroke="#EF476F" stroke-width="3"/>' +
      '<line x1="'+x2+'" y1="'+(lineY-8)+'" x2="'+x2+'" y2="'+(lineY+8)+'" stroke="#EF476F" stroke-width="3"/>' +
      '</svg>';
  }

  function buildRulerMeasure(){
    // half-cm increments (matches worksheet precision); start offset is
    // non-zero ~40% of the time, per the worksheet's "watch the start point" trap
    const startHalfSteps = Math.random() < 0.4 ? rand(1, 6) : 0; // units of 0.5cm
    const lengthHalfSteps = rand(3, 16); // 1.5cm to 8cm long
    const endHalfSteps = startHalfSteps + lengthHalfSteps;
    if(endHalfSteps > 28){ return buildRulerMeasure(); } // keep within 0-15cm ruler with margin

    const startCm = startHalfSteps/2, endCm = endHalfSteps/2;
    const lengthCm = lengthHalfSteps/2;

    const askInMm = Math.random() < 0.5;
    const svg = rulerSVG(startCm, endCm);

    let promptText, answerText, hint;
    if(askInMm){
      const lengthMm = Math.round(lengthCm*10);
      promptText = 'How long is the line, in millimetres?';
      answerText = lengthMm + 'mm';
      hint = 'Type the number and unit, e.g. 65mm';
    } else {
      const lengthLabel = (lengthCm % 1 === 0) ? String(lengthCm) : lengthCm.toFixed(1);
      promptText = 'How long is the line, in centimetres?';
      answerText = lengthLabel + 'cm';
      hint = 'Type the number and unit, e.g. 8cm or 6.5cm';
    }

    const html =
      '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
      '<div class="opLabel">' + promptText + '</div>';

    return {kind:'textinput', op:'shapes', answer: answerText, html, inputHint: hint};
  }

  // ---- 9. Turn <-> right-angle equivalence ----
  const TURN_TO_RA = {quarter:1, half:2, 'three-quarter':3, full:4};
  const TURN_NAMES = Object.keys(TURN_TO_RA);

  function buildTurnRightAngleEquiv(){
    const forward = Math.random() < 0.5;
    if(forward){
      const turnKey = choice(TURN_NAMES);
      const answer = TURN_TO_RA[turnKey];
      const html =
        '<div class="wordProblem"><span class="icon">🔄</span>' +
          'A ' + turnKey + ' turn is the same as how many right angles?' +
        '</div>';
      return {kind:'shapes', op:'shapes', answer, html, choices: makeNumberChoices(answer)};
    } else {
      const turnKey = choice(TURN_NAMES);
      const raCount = TURN_TO_RA[turnKey];
      const html =
        '<div class="wordProblem"><span class="icon">🔄</span>' +
          raCount + ' right angle' + (raCount > 1 ? 's' : '') + ' is the same as what kind of turn?' +
        '</div>';
      const choices = shuffle(TURN_NAMES.slice()).map(t => ({label: t, value: t}));
      return {kind:'shapes', op:'shapes', answer: turnKey, html, choices};
    }
  }

  // ---- 10. Perpendicular/parallel misconception true-or-false ----
  function gridLinesSVG(seg1, seg2){
    const cell = 18, cols = 8, rows = 6;
    const w = cols*cell, h = rows*cell;
    let grid = '';
    for(let i=0;i<=cols;i++) grid += '<line x1="'+(i*cell)+'" y1="0" x2="'+(i*cell)+'" y2="'+h+'" stroke="#EADFC8" stroke-width="1"/>';
    for(let j=0;j<=rows;j++) grid += '<line x1="0" y1="'+(j*cell)+'" x2="'+w+'" y2="'+(j*cell)+'" stroke="#EADFC8" stroke-width="1"/>';
    const l1 = '<line x1="'+(seg1[0]*cell)+'" y1="'+(seg1[1]*cell)+'" x2="'+(seg1[2]*cell)+'" y2="'+(seg1[3]*cell)+'" stroke="#2B2D42" stroke-width="3" stroke-linecap="round"/>';
    const l2 = '<line x1="'+(seg2[0]*cell)+'" y1="'+(seg2[1]*cell)+'" x2="'+(seg2[2]*cell)+'" y2="'+(seg2[3]*cell)+'" stroke="#EF476F" stroke-width="3" stroke-linecap="round"/>';
    return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">' + grid + l1 + l2 + '</svg>';
  }

  // each scenario's geometric relationship (answer) and the True/False
  // claim (claimTruth) have both been independently verified by computing
  // the actual angle between the two segments
  const PERP_PARALLEL_SCENARIOS = [
    {seg1:[1,1,1,3], seg2:[3,2,5,2], answer:'perpendicular',
     claim:'These lines are not perpendicular because they do not meet.', claimTruth:'False'},
    {seg1:[1,1,5,1], seg2:[1,4,5,4], answer:'parallel',
     claim:'These lines are parallel.', claimTruth:'True'},
    {seg1:[1,1,1,4], seg2:[1,4,5,4], answer:'perpendicular',
     claim:'These lines are perpendicular.', claimTruth:'True'},
    {seg1:[1,1,4,2], seg2:[1,4,5,3], answer:'neither',
     claim:'These lines are parallel because they do not meet.', claimTruth:'False'}
  ];

  function buildPerpParallelReasoning(){
    const scenario = choice(PERP_PARALLEL_SCENARIOS);
    const svg = gridLinesSVG(scenario.seg1, scenario.seg2);
    const html =
      '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
      '<div class="wordProblem"><span class="icon">🐢</span>"' + scenario.claim + '"</div>' +
      '<div class="opLabel">Is this statement true or false?</div>';
    const choices = shuffle(['True','False']).map(v => ({label:v, value:v}));
    return {kind:'shapes', op:'shapes', answer: scenario.claimTruth, html, choices};
  }

  // ---- 11. Line of symmetry ----
  // every shape's vertical/horizontal symmetry below has been independently
  // verified by reflecting its actual coordinates across the midline and
  // checking the point set matches
  const SYMMETRY_SHAPES = [
    {name:'triangle', vertical:true, horizontal:false,
     svg: '<polygon points="60,10 10,90 110,90" fill="#FFD166" stroke="#2B2D42" stroke-width="3"/>'},
    {name:'rectangle', vertical:true, horizontal:true,
     svg: '<rect x="15" y="30" width="90" height="50" fill="#06D6A0" stroke="#2B2D42" stroke-width="3"/>'},
    {name:'right-angled triangle', vertical:false, horizontal:false,
     svg: '<polygon points="15,90 15,15 95,90" fill="#FF6B6B" stroke="#2B2D42" stroke-width="3"/>'},
    {name:'arrow', vertical:false, horizontal:true,
     svg: '<polygon points="10,35 70,35 70,15 110,50 70,85 70,65 10,65" fill="#4FB6E8" stroke="#2B2D42" stroke-width="3"/>'},
    {name:'hexagon', vertical:true, horizontal:true,
     svg: '<polygon points="60,8 105,33 105,77 60,102 15,77 15,33" fill="#EF476F" stroke="#2B2D42" stroke-width="3"/>'},
    {name:'trapezium', vertical:true, horizontal:false,
     svg: '<polygon points="30,20 90,20 110,90 10,90" fill="#8FD3C7" stroke="#2B2D42" stroke-width="3"/>'},
    {name:'parallelogram', vertical:false, horizontal:false,
     svg: '<polygon points="35,20 110,20 85,90 10,90" fill="#FFD166" stroke="#2B2D42" stroke-width="3"/>'}
  ];

  function buildLineOfSymmetry(){
    const shape = choice(SYMMETRY_SHAPES);
    const axis = choice(['vertical','horizontal']);
    const hasAxis = shape[axis];

    const svg = '<svg width="120" height="110" viewBox="0 0 120 110">' + shape.svg + '</svg>';
    const html =
      '<div class="visualRow"><div class="visualWrap">' + svg + '</div></div>' +
      '<div class="opLabel">Does this shape have a ' + axis + ' line of symmetry?</div>';
    const answer = hasAxis ? 'Yes' : 'No';
    const choices = shuffle(['Yes','No']).map(v => ({label:v, value:v}));
    return {kind:'shapes', op:'shapes', answer, html, choices};
  }

  function buildShapesAngles(){
    const r = Math.random();
    if(r < 0.11) return buildTurns();
    if(r < 0.22) return buildRightAngleCount();
    if(r < 0.32) return buildCompareAngles();
    if(r < 0.42) return buildClassifyAngle();
    if(r < 0.52) return buildHorizVert();
    if(r < 0.62) return buildParallelPerp();
    if(r < 0.70) return buildShapeNaming();
    if(r < 0.78) return buildRulerMeasure();
    if(r < 0.86) return buildTurnRightAngleEquiv();
    if(r < 0.94) return buildPerpParallelReasoning();
    return buildLineOfSymmetry();
  }

  // ================= END YEAR 3 GENERATORS =================

  // ---------------- Dispatch ----------------
  function buildProblem(){
    const op = pickActiveOp();
    if(op === 'frac') return buildFraction();
    if(op === 'meas') return buildMeasurement();
    if(op === 'stat') return buildStatistics();
    if(op === 'pv') return buildPlaceValue();
    if(op === 'multi') return buildMultiples();
    if(op === 't3') return buildTimesTable3();
    if(op === 'dvy3') return buildSharingGrouping();
    if(op === 'fracy3') return buildFractionsPlus();
    if(op === 'masscap') return buildMassCapacity();
    if(op === 'shapes') return buildShapesAngles();
    return buildArithmetic(op);
  }

  function renderTrail(){
    els.trail.innerHTML = '';
    for(let i = 0; i < state.trailLen; i++){
      const span = document.createElement('span');
      span.className = 'pawSlot' + (i < state.trailFill ? ' filled' : '');
      span.textContent = '🐾';
      els.trail.appendChild(span);
    }
    els.streakBadge.textContent = '🔥 ' + state.streak;
  }

  function newProblem(){
    state.locked = false;
    els.feedback.textContent = '';
    els.feedback.className = 'feedback';

    const p = buildProblem();
    state.current = p;

    const meta = OP_META[p.op] || {};
    if(p.kind === 'arithmetic'){
      els.opLabel.style.display = '';
      els.opLabel.textContent = meta.label || '';
    } else {
      // fraction/measurement/statistics/masscap builders embed their own
      // inline prompt inside .html, so hide the generic top label
      els.opLabel.style.display = 'none';
    }

    els.displayArea.innerHTML = p.html;

    els.choices.innerHTML = '';

    if(p.kind === 'textinput'){
      els.choices.style.display = 'block';
      const wrap = document.createElement('div');
      wrap.innerHTML =
        '<div class="textInputRow">' +
          '<input type="text" class="textInputBox" id="textAnswerInput" autocomplete="off" autocapitalize="off" autocorrect="off" inputmode="text" placeholder="?">' +
          '<button class="checkBtn" id="textAnswerCheck">Check</button>' +
        '</div>' +
        (p.inputHint ? '<div class="inputHint">' + p.inputHint + '</div>' : '');
      els.choices.appendChild(wrap);

      const input = document.getElementById('textAnswerInput');
      const checkBtn = document.getElementById('textAnswerCheck');
      const submit = () => handleTextAnswer(input.value, input);
      checkBtn.addEventListener('click', submit);
      input.addEventListener('keydown', (e) => { if(e.key === 'Enter') submit(); });
      setTimeout(() => input.focus(), 50);
      return;
    }

    els.choices.style.display = 'grid';
    p.choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choiceBtn';
      if(c.isHtml){
        btn.innerHTML = c.label;
        btn.style.padding = '10px';
        btn.style.display = 'flex';
        btn.style.alignItems = 'center';
        btn.style.justifyContent = 'center';
      } else {
        if(String(c.label).length > 3) btn.style.fontSize = '24px';
        if(String(c.label).length > 10) btn.style.fontSize = '17px';
        btn.textContent = c.label;
      }
      btn.addEventListener('click', () => handleAnswer(c.value, btn));
      els.choices.appendChild(btn);
    });
  }

  function handleAnswer(val, btn){
    if(state.locked) return;
    state.locked = true;

    const correct = val === state.current.answer;
    const allBtns = Array.from(els.choices.children);

    if(correct){
      btn.classList.add('correct');
      allBtns.forEach(b => { if(b !== btn) b.classList.add('dim'); });
      els.feedback.textContent = pickPraise();
      els.feedback.className = 'feedback good';

      state.streak++;
      state.trailFill++;
      if(state.trailFill >= state.trailLen){
        state.trailFill = 0;
        celebrateTrail();
      }
      if(state.streak > state.best){
        state.best = state.streak;
        localStorage.setItem('nt_best', state.best);
      }
      renderTrail();
      setTimeout(newProblem, 750);
    } else {
      btn.classList.add('wrong');
      // find the button whose recorded value matches the correct answer
      const idx = state.current.choices.findIndex(c => c.value === state.current.answer);
      allBtns.forEach((b, i) => {
        if(i === idx) b.classList.add('correct');
        else if(b !== btn) b.classList.add('dim');
      });
      const correctChoice = idx >= 0 ? state.current.choices[idx] : null;
      const correctLabel = correctChoice ? (correctChoice.isHtml ? 'the highlighted one' : correctChoice.label) : state.current.answer;
      els.feedback.textContent = 'Almost! It was ' + correctLabel + '. Try the next one!';
      els.feedback.className = 'feedback bad';

      state.streak = 0;
      renderTrail();
      setTimeout(newProblem, 1600);
    }
  }

  // Normalizes a length answer like " 8 Cm " or "65MM" down to "8cm" / "65mm"
  // for comparison: trims, lowercases, and collapses internal whitespace
  // between the number and unit so spacing doesn't matter, but the unit
  // itself must match (8cm is not accepted for a 65mm answer or vice versa).
  function normalizeLengthAnswer(str){
    return String(str).trim().toLowerCase().replace(/\s+/g, '');
  }

  function handleTextAnswer(rawValue, inputEl){
    if(state.locked) return;
    if(rawValue.trim() === '') return; // ignore empty submissions, let them keep typing
    state.locked = true;

    const normalized = normalizeLengthAnswer(rawValue);
    const correctNormalized = normalizeLengthAnswer(state.current.answer);
    const correct = normalized === correctNormalized;

    const checkBtn = document.getElementById('textAnswerCheck');
    if(checkBtn) checkBtn.disabled = true;

    if(correct){
      inputEl.classList.add('correct');
      els.feedback.textContent = pickPraise();
      els.feedback.className = 'feedback good';

      state.streak++;
      state.trailFill++;
      if(state.trailFill >= state.trailLen){
        state.trailFill = 0;
        celebrateTrail();
      }
      if(state.streak > state.best){
        state.best = state.streak;
        localStorage.setItem('nt_best', state.best);
      }
      renderTrail();
      setTimeout(newProblem, 750);
    } else {
      inputEl.classList.add('wrong');
      els.feedback.textContent = 'Almost! It was ' + state.current.answer + '. Try the next one!';
      els.feedback.className = 'feedback bad';

      state.streak = 0;
      renderTrail();
      setTimeout(newProblem, 1800);
    }
  }


  function pickPraise(){
    const lines = ['Nice work! 🎉','You got it! ⭐','Super! 🌟','Great job! 🙌','Yes! 🐾','Brilliant! 🎈'];
    return lines[rand(0, lines.length - 1)];
  }

  function celebrateTrail(){
    els.feedback.textContent = "Trail complete! You're amazing! 🏆";
    els.feedback.className = 'feedback good';
  }

  function setMode(mode){
    if(state.level === 'y3'){
      state.modeY3 = mode;
      localStorage.setItem('nt_mode_y3', mode);
      Array.from(els.modeBarY3.children).forEach(b => {
        b.classList.toggle('active', b.dataset.mode === mode);
      });
    } else {
      state.mode = mode;
      localStorage.setItem('nt_mode', mode);
      Array.from(els.modeBar.children).forEach(b => {
        b.classList.toggle('active', b.dataset.mode === mode);
      });
    }
    state.trailFill = 0;
    state.streak = 0;
    renderTrail();
    newProblem();
  }

  function setLevel(level){
    state.level = level;
    localStorage.setItem('nt_level', level);
    Array.from(els.levelToggle.children).forEach(b => {
      b.classList.toggle('active', b.dataset.level === level);
    });
    if(level === 'y3'){
      els.modeBar.style.display = 'none';
      els.modeBarY3.style.display = '';
    } else {
      els.modeBar.style.display = '';
      els.modeBarY3.style.display = 'none';
    }
    state.trailFill = 0;
    state.streak = 0;
    renderTrail();
    newProblem();
  }

  // ---- wire up events ----
  Array.from(els.modeBar.children).forEach(b => {
    b.addEventListener('click', () => setMode(b.dataset.mode));
  });
  Array.from(els.modeBarY3.children).forEach(b => {
    b.addEventListener('click', () => setMode(b.dataset.mode));
  });
  Array.from(els.levelToggle.children).forEach(b => {
    b.addEventListener('click', () => setLevel(b.dataset.level));
  });

  els.settingsBtn.addEventListener('click', () => {
    els.overlay.classList.add('show');
  });
  els.closeSheet.addEventListener('click', () => {
    els.overlay.classList.remove('show');
  });
  els.overlay.addEventListener('click', (e) => {
    if(e.target === els.overlay) els.overlay.classList.remove('show');
  });

  els.maxNum.value = state.maxNum;
  els.trailLen.value = state.trailLen;

  els.maxNum.addEventListener('change', () => {
    state.maxNum = parseInt(els.maxNum.value);
    localStorage.setItem('nt_max', state.maxNum);
    newProblem();
  });
  els.trailLen.addEventListener('change', () => {
    state.trailLen = parseInt(els.trailLen.value);
    localStorage.setItem('nt_trail', state.trailLen);
    state.trailFill = 0;
    renderTrail();
  });
  els.resetBtn.addEventListener('click', () => {
    state.best = 0;
    localStorage.setItem('nt_best', 0);
  });

  // ---- init ----
  Array.from(els.levelToggle.children).forEach(b => {
    b.classList.toggle('active', b.dataset.level === state.level);
  });
  if(state.level === 'y3'){
    els.modeBar.style.display = 'none';
    els.modeBarY3.style.display = '';
  }
  Array.from(els.modeBar.children).forEach(b => {
    b.classList.toggle('active', b.dataset.mode === state.mode);
  });
  Array.from(els.modeBarY3.children).forEach(b => {
    b.classList.toggle('active', b.dataset.mode === state.modeY3);
  });
  renderTrail();
  newProblem();
})();
</script>

</body>
</html>
