<title>Max's fish math</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF8EC;
    --ink:#2B2D42;
    --coral:#FF6B6B;
    --coral-dark:#E85555;
    --sun:#FFD166;
    --sage:#06D6A0;
    --rose:#EF476F;
    --line:#EADFC8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--paper);
    color:var(--ink);
    font-family:'Quicksand', sans-serif;
    overscroll-behavior:none;
    -webkit-user-select:none; user-select:none;
  }
  body{
    display:flex; flex-direction:column;
    min-height:100vh;
    min-height:100dvh;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .num{font-family:'Baloo 2', sans-serif;}

  /* ---------- Top bar / trail ---------- */
  .topbar{
    padding:14px 18px 10px;
    flex-shrink:0;
  }
  .row1{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:10px;
  }
  .brand{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:16px;
    color:var(--coral-dark);
    display:flex; align-items:center; gap:6px;
  }
  .settingsBtn{
    width:36px; height:36px; border-radius:50%;
    border:2px solid var(--line);
    background:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
    cursor:pointer;
  }
  .trailWrap{
    background:#fff;
    border:2px solid var(--line);
    border-radius:18px;
    padding:10px 14px;
    display:flex;
    align-items:center;
    gap:4px;
    overflow:hidden;
  }
  .trail{
    display:flex; align-items:center; gap:3px;
    flex:1;
    overflow-x:auto;
    overflow-y:hidden;
  }
  .pawSlot{
    width:100px;
    height:100px;
    opacity:0.18;
    flex-shrink:0;
    transition:opacity .25s, transform .25s;
  }
  .pawSlot.filled{ opacity:1; transform:scale(1.12); }
  .streakBadge{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:15px;
    background:var(--sun);
    color:var(--ink);
    border-radius:12px;
    padding:4px 10px;
    flex-shrink:0;
    white-space:nowrap;
  }

  /* ---------- Level toggle ---------- */
  .levelToggle{
    display:flex;
    gap:6px;
    margin-bottom:10px;
  }
  .levelBtn{
    flex:1;
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:11.5px;
    line-height:1.2;
    padding:7px 4px;
    border-radius:10px;
    border:2px solid var(--line);
    background:#fff;
    color:#8a8472;
    cursor:pointer;
  }
  .levelBtn.active{
    background:var(--ink);
    border-color:var(--ink);
    color:#fff;
  }

  /* ---------- Place value chart ---------- */
  .pvChart{
    display:flex;
    justify-content:center;
    gap:6px;
    margin-bottom:18px;
  }
  .pvCol{
    flex:1;
    max-width:110px;
    background:#fff;
    border:2px solid var(--line);
    border-radius:14px;
    overflow:hidden;
  }
  .pvColHead{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:13px;
    text-align:center;
    padding:6px 0;
    color:#fff;
  }
  .pvColHead.h{ background:#06D6A0; }
  .pvColHead.t{ background:#FFD166; color:var(--ink); }
  .pvColHead.o{ background:#FF6B6B; }
  .pvColBody{
    min-height:70px;
    padding:8px 6px;
    display:flex;
    flex-wrap:wrap;
    gap:4px;
    align-items:flex-start;
    justify-content:center;
  }
  .pvCounter{
    font-size:11px;
    font-weight:700;
    border-radius:50%;
    width:24px; height:24px;
    display:flex; align-items:center; justify-content:center;
    color:#fff;
    flex-shrink:0;
  }
  .pvCounter.h{ background:#06D6A0; }
  .pvCounter.t{ background:#FFD166; color:var(--ink); }
  .pvCounter.o{ background:#FF6B6B; }

  /* ---------- Column arithmetic grid ---------- */
  .colGrid{
    display:flex;
    justify-content:center;
    margin-bottom:18px;
  }
  .colTable{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:30px;
    border-collapse:collapse;
  }
  .colTable td{
    width:46px;
    height:50px;
    text-align:center;
    vertical-align:middle;
  }
  .colTable .opCell{ color:var(--coral); font-size:26px; }
  .colTable .ruleRow td{
    border-bottom:3px solid var(--ink);
    height:0;
    padding:0;
  }
  .colTable .missing{
    background:#fff;
    border:3px dashed var(--line);
    border-radius:10px;
  }

  /* ---------- Missing-digit sentence ---------- */
  .digitSentence{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:min(12vw, 46px);
    text-align:center;
    margin-bottom:22px;
    line-height:1.3;
  }
  .digitSentence .blank{
    display:inline-block;
    min-width:0.9em;
    background:#fff;
    border:3px dashed var(--line);
    border-radius:10px;
    padding:0 6px;
    color:var(--coral-dark);
  }

  /* ---------- Main play area ---------- */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:10px 18px 24px;
  }
  .problemCard{
    width:100%;
    max-width:420px;
    text-align:center;
  }
  .opLabel{
    font-size:15px;
    font-weight:600;
    color:#8a8472;
    margin-bottom:6px;
    letter-spacing:0.5px;
  }
  .problem{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:min(20vw, 84px);
    line-height:1;
    margin:6px 0 26px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
  }
  .problem .opSym{ color:var(--coral); }
  .problem .eq{ color:#c9c2ab; }
  .qbox{
    background:#fff;
    border:3px dashed var(--line);
    border-radius:16px;
    min-width:1.3em;
    padding:0 10px;
  }

  .choices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .choiceBtn{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:38px;
    padding:22px 10px;
    border-radius:20px;
    border:none;
    background:#fff;
    border:3px solid var(--line);
    color:var(--ink);
    cursor:pointer;
    transition: transform .12s, background .15s, border-color .15s;
  }
  .choiceBtn:active{ transform:scale(0.95); }
  .choiceBtn.correct{
    background:var(--sage);
    border-color:var(--sage);
    color:#fff;
  }
  .choiceBtn.wrong{
    background:var(--rose);
    border-color:var(--rose);
    color:#fff;
  }
  .choiceBtn.dim{ opacity:0.45; }

  /* ---------- Open answer input (Y3, no multiple choice) ---------- */
  .openAnswer{
    display:flex;
    gap:10px;
    align-items:stretch;
  }
  .openInput{
    flex:1;
    min-width:0;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:28px;
    text-align:center;
    padding:14px 10px;
    border-radius:16px;
    border:3px dashed var(--line);
    background:#fff;
    color:var(--ink);
  }
  .openInput:focus{
    outline:none;
    border-color:var(--coral);
  }
  .openInput.correct{
    border-style:solid;
    border-color:var(--sage);
    background:var(--sage);
    color:#fff;
  }
  .openInput.wrong{
    border-style:solid;
    border-color:var(--rose);
    background:var(--rose);
    color:#fff;
  }
  .checkBtn{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:17px;
    padding:0 22px;
    border-radius:16px;
    border:none;
    background:var(--coral);
    color:#fff;
    cursor:pointer;
    flex-shrink:0;
  }
  .checkBtn:disabled{ opacity:0.5; }

  .feedback{
    min-height:34px;
    margin-top:16px;
    font-weight:700;
    font-size:17px;
  }
  .feedback.good{ color:#08966f; }
  .feedback.bad{ color:var(--rose); }

  .explainBtn{
    margin-top:10px;
    width:36px;
    height:36px;
    border-radius:50%;
    border:2px solid var(--coral);
    background:#fff;
    color:var(--coral-dark);
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:18px;
    cursor:pointer;
    flex-shrink:0;
  }
  .explainBtn:active{ background:var(--coral); color:#fff; }
  .explainPanel{
    margin-top:12px;

  // Renders one fish as a small transparent-background thumbnail.
  function fishImgHTML(fish){
    return '<img src="' + fish.img + '" alt="' + fish.name + '" style="width:100%;height:100%;object-fit:contain;display:block;">';
  }

  function saveAlbum(){
    localStorage.setItem('nt_album', JSON.stringify(state.album));
    localStorage.setItem('nt_totalcaught', state.totalCaught);
  }

  // A species is "unlocked" simply by being in the album (chosen by the child).
  function isUnlocked(fish){
    return !!state.album[fish.id];
  }
  function unlockedSpecies(){
    return FISH_LIST.filter(isUnlocked);
  }
  function lockedSpecies(){
    return FISH_LIST.filter(f => !isUnlocked(f));
  }
  // ================= END FISH COLLECTION =================


  const ALL_MODES = ['add','sub','mul','div','frac','meas','stat'];
  const ALL_MODES_Y3 = ['addy3','suby3','multy3','dvy3','fracy3','len3','perim','pattern','numline','partition','pictogram','stat'];

  function pickActiveOp(){
    if(state.level === 'y3' || state.level === 'y3open'){
      if(state.modeY3 !== 'mixy3') return state.modeY3;
      return choice(ALL_MODES_Y3);
    }
    if(state.mode !== 'mix') return state.mode;
    return choice(ALL_MODES);
  }

  // ---------------- Arithmetic ----------------
  function buildArithmetic(op){
    let a,b,answer;
    const max = state.maxNum;

    if(op === 'add'){
      a = rand(0, max); b = rand(0, max);
      answer = a + b;
    } else if(op === 'sub'){
      a = rand(0, max); b = rand(0, a); // never negative
      answer = a - b;
    } else if(op === 'mul'){
      const smallMax = Math.min(max, 12);
      a = rand(0, smallMax); b = rand(0, smallMax);
      answer = a * b;
    } else { // div
      const smallMax = Math.min(max, 12);
      b = rand(1, smallMax);
      answer = rand(0, smallMax);
      a = b * answer; // ensures whole number result
    }

    const meta = OP_META[op];
    const html =
      '<div class="problem">' +
        '<span>' + a + '</span>' +
        '<span class="opSym">' + meta.sym + '</span>' +
        '<span>' + b + '</span>' +
        '<span class="eq">=</span>' +
        '<span class="qbox">?</span>' +
      '</div>';

    return {
      kind: 'arithmetic', op, answer, html,
      choices: makeNumberChoices(answer)
    };
  }

  function makeNumberChoices(answer){
    const set = new Set([answer]);
    let guardCount = 0;
    while(set.size < 4 && guardCount < 50){
      guardCount++;
      const spread = Math.max(3, Math.round(answer * 0.3) + 2);
      let distractor = answer + rand(-spread, spread);
      if(distractor < 0) distractor = answer + rand(1, spread+1);
      if(distractor !== answer) set.add(distractor);
    }
    return shuffle(Array.from(set)).map(v => ({label: String(v), value: v}));
  }

  // ---------------- Fractions ----------------
  // SVG pie/bar showing a shaded fraction; ask "what fraction is shaded?"
  // or show two shapes and ask to compare.
  const FRAC_DENOMS = [2,3,4,5,6,8,10];

  function fracShapeSVG(num, den, size, fillColor){
    size = size || 100;
    const cx = size/2, cy = size/2, r = size/2 - 4;
    let paths = '';
    const slice = (Math.PI*2)/den;
    for(let i=0;i<den;i++){
      const startA = -Math.PI/2 + i*slice;
      const endA = startA + slice;
      const x1 = cx + r*Math.cos(startA), y1 = cy + r*Math.sin(startA);
      const x2 = cx + r*Math.cos(endA), y2 = cy + r*Math.sin(endA);
      const fill = i < num ? fillColor : '#fff';
      paths += '<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 0 1 '+x2+','+y2+' Z" fill="'+fill+'" stroke="#2B2D42" stroke-width="2"/>';
    }
    return '<svg class="fractionShape" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+paths+'</svg>';
  }

  function buildFractionIdentify(){
    const den = choice(FRAC_DENOMS);
    const num = rand(1, den-1);
    const html =
      '<div class="fractionRow">' + fracShapeSVG(num, den, 150, '#FF6B6B') + '</div>' +
      '<div class="opLabel" style="margin-top:-8px;">What fraction is shaded?</div>';

    const answerLabel = num + '/' + den;
    const set = new Set([answerLabel]);
    let guard = 0;
    while(set.size < 4 && guard < 40){
      guard++;
      const dDen = choice(FRAC_DENOMS);
      const dNum = rand(1, dDen-1);
      const lbl = dNum+'/'+dDen;
      if(lbl !== answerLabel) set.add(lbl);
    }
    const choices = shuffle(Array.from(set)).map(l => ({label: l, value: l}));

    return {kind:'fraction', answer: answerLabel, html, choices};
  }

  function buildFractionCompare(){
    // same denominator or same numerator, per grade-3 scope
    const sameDen = Math.random() < 0.5;
    let n1, d1, n2, d2;
    if(sameDen){
      const denOptions = FRAC_DENOMS.filter(d => d > 2); // need 2+ distinct numerators
      const den = choice(denOptions);
      n1 = rand(1, den-1); n2 = rand(1, den-1);
      while(n2 === n1) n2 = rand(1, den-1);
      d1 = d2 = den;
    } else {
      const num = rand(1, 4);
      const denOptions = FRAC_DENOMS.filter(d => d > num);
      d1 = choice(denOptions); d2 = choice(denOptions);
      while(d2 === d1) d2 = choice(denOptions);
      n1 = n2 = num;
    }
    const v1 = n1/d1, v2 = n2/d2;
    const answer = v1 > v2 ? '>' : (v1 < v2 ? '<' : '=');

    const html =
      '<div class="fractionRow">' +
        '<div>' + fracShapeSVG(n1, d1, 110, '#06D6A0') +
          '<div class="fractionCaption">'+n1+'/'+d1+'</div></div>' +
        '<div style="font-size:34px;align-self:center;color:#c9c2ab;">?</div>' +
        '<div>' + fracShapeSVG(n2, d2, 110, '#FFD166') +
          '<div class="fractionCaption">'+n2+'/'+d2+'</div></div>' +
      '</div>' +
      '<div class="opLabel" style="margin-top:-8px;">Which sign goes in the middle?</div>';

    const choices = shuffle(['>','<','=']).map(s => ({label:s, value:s}));
    return {kind:'fraction', answer, html, choices};
  }

  function buildFraction(){
    return Math.random() < 0.5 ? buildFractionIdentify() : buildFractionCompare();
  }

  // ---------------- Statistics / graphs ----------------
  const STAT_THEMES = [
    {title:'Favorite fruit', labels:['🍎','🍌','🍇','🍓'], names:['Apple','Banana','Grape','Strawberry']},
    {title:'Pets in class', labels:['🐶','🐱','🐠','🐰'], names:['Dogs','Cats','Fish','Rabbits']},
    {title:'Favorite sport', labels:['⚽','🏀','⚾','🎾'], names:['Soccer','Basketball','Baseball','Tennis']}
  ];

  function buildStatistics(){
    const theme = choice(STAT_THEMES);
    const n = 4;
    // generate 4 distinct values so "which is most" and "how many more" are always unambiguous
    const values = [];
    while(values.length < n){
      const v = rand(2,12);
      if(!values.includes(v)) values.push(v);
    }
    const colors = ['#FF6B6B','#06D6A0','#FFD166','#EF476F'];
    const maxVal = Math.max(...values);

    let bars = '';
    for(let i=0;i<n;i++){
      const heightPct = Math.round((values[i]/maxVal)*100);
      bars +=
        '<div class="barCol">' +
          '<div class="barVal">'+values[i]+'</div>' +
          '<div class="barFill" style="height:'+heightPct+'%; background:'+colors[i]+';"></div>' +
          '<div class="barLabel">'+theme.labels[i]+'<br>'+theme.names[i]+'</div>' +
        '</div>';
    }

    // question types
    const qType = choice(['most','total','diff','howmany']);
    let questionText, answer;
    const iMax = values.indexOf(maxVal);
    if(qType === 'most'){
      questionText = 'Which was picked the most?';
      answer = theme.names[iMax];
    } else if(qType === 'total'){
      questionText = 'How many votes were there in total?';
      answer = values.reduce((s,v)=>s+v,0);
    } else if(qType === 'howmany'){
      const i = rand(0,n-1);
      questionText = 'How many people picked ' + theme.names[i] + '?';
      answer = values[i];
    } else {
      let i1 = rand(0,n-1), i2 = rand(0,n-1);
      while(i2 === i1) i2 = rand(0,n-1);
      const hi = values[i1] > values[i2] ? i1 : i2;
      const lo = hi === i1 ? i2 : i1;
      questionText = 'How many more people picked ' + theme.names[hi] + ' than ' + theme.names[lo] + '?';
      answer = values[hi] - values[lo];
    }

    const html =
      '<div class="chartWrap">' +
        '<div class="chartTitle">'+theme.title+'</div>' +
        '<div class="barRow">'+bars+'</div>' +
      '</div>' +
      '<div class="opLabel" style="margin-top:-8px;">'+questionText+'</div>';

    let choices;
    if(qType === 'most'){
      choices = shuffle(theme.names.slice()).map(nm => ({label:nm, value:nm}));
    } else {
      choices = makeNumberChoices(answer);
    }

    return {kind:'statistics', answer, html, choices};
  }

  // Render an H/T/O place value chart as counters (caps at a readable count per cell)
  function pvChartHTML(hundreds, tens, ones){
    function cell(count, cls, label){
      let dots = '';
      const shown = Math.min(count, 9);
      for(let i=0;i<shown;i++){
        dots += '<div class="pvCounter '+cls+'">'+(cls==='h'?100:cls==='t'?10:1)+'</div>';
      }
      return '<div class="pvCol"><div class="pvColHead '+cls+'">'+label+'</div><div class="pvColBody">'+dots+'</div></div>';
    }
    return '<div class="pvChart">' +
      cell(hundreds,'h','H') +
      cell(tens,'t','T') +
      cell(ones,'o','O') +
      '</div>';
  }

  // ---- Place value: column addition/subtraction (no exchange) ----
  // ---- Addition: column addition (no exchange), missing addend, "X more than Y" ----
  // Explains a single ones-digit "crossing the ten" step in two different
  // ways, so a child who is stuck on regrouping can find a method that clicks.
  function explainTenCrossingAdd(aO, bO){
    const complement = 10 - aO;
    const rest = bO - complement;
    const total = aO + bO;
    return (
      '<div style="margin-top:10px;padding-top:10px;border-top:2px dotted var(--coral);">' +
      '<b>Crossing the ten (' + aO + ' + ' + bO + '):</b><br><br>' +
      '<u>Method 1 – Make a ten:</u><br>' +
      aO + ' + ' + complement + ' = 10 (that uses up ' + complement + ' from the ' + bO + ')<br>' +
      '10 + ' + rest + ' = ' + total + '<br><br>' +
      '<u>Method 2 – Count on:</u><br>' +
      'Start at ' + aO + '. Count on ' + bO + ' more, through 10, to reach ' + total + '.' +
      '</div>'
    );
  }
  function explainTenCrossingSub(value, bO){
    // value = the ones digit after borrowing a ten (always 10..18)
    const toTen = value - 10;
    const rest = bO - toTen;
    const answer = value - bO;
    return (
      '<div style="margin-top:10px;padding-top:10px;border-top:2px dotted var(--coral);">' +
      '<b>Crossing the ten (' + value + ' − ' + bO + '):</b><br><br>' +
      '<u>Method 1 – Bridge through 10:</u><br>' +
      value + ' − ' + toTen + ' = 10<br>' +
      '10 − ' + rest + ' = ' + answer + '<br><br>' +
      '<u>Method 2 – Count up:</u><br>' +
      'Count up from ' + bO + ' to ' + value + ': ' + bO + ' to 10 is ' + (10-bO) + ', then 10 to ' + value + ' is ' + toTen + '. ' +
      (10-bO) + ' + ' + toTen + ' = ' + answer +
      '</div>'
    );
  }

  function buildAdditionY3(){
    const qType = choice(['column','missingAddend','moreThan']);

    if(qType === 'column'){
      const withCrossing = Math.random() < 0.5;
      let aH, aT, aO, bH, bT, bO;
      if(!withCrossing){
        aH = rand(1,8); aT = rand(0,8); aO = rand(0,8);
        bH = rand(0, 9-aH); bT = rand(0, 9-aT); bO = rand(0, 9-aO);
      } else {
        // force the ones column to cross a ten (e.g. 4 + 9), tens/hundreds free
        aH = rand(1,7); aT = rand(0,8); aO = rand(2,9);
        bH = rand(0, 8-aH); bT = rand(0, 9-aT);
        bO = rand(10-aO+1, 9); // aO + bO will be >= 11
      }
      const a = aH*100+aT*10+aO, b = bH*100+bT*10+bO;
      const answer = a+b;
      const aStr = String(a).padStart(3,'0').split('');
      const bStr = String(b).padStart(3,'0').split('');
      const html =
        '<div class="colGrid"><table class="colTable"><tr>' +
          '<td></td><td>'+aStr[0]+'</td><td>'+aStr[1]+'</td><td>'+aStr[2]+'</td>' +
        '</tr><tr>' +
          '<td class="opCell">+</td><td>'+bStr[0]+'</td><td>'+bStr[1]+'</td><td>'+bStr[2]+'</td>' +
        '</tr><tr class="ruleRow"><td></td><td></td><td></td><td></td></tr><tr>' +
          '<td></td><td class="missing">?</td><td class="missing">?</td><td class="missing">?</td>' +
        '</tr></table></div>';
      let steps = [], running = a;
      if(bH>0){ running += bH*100; steps.push(a + ' + ' + (bH*100) + ' = ' + running); }
      if(bT>0){ const prev = running; running += bT*10; steps.push(prev + ' + ' + (bT*10) + ' = ' + running); }
      if(bO>0){ const prev = running; running += bO; steps.push(prev + ' + ' + bO + ' = ' + running); }
      let explain = 'Add each part of ' + b + ' separately:<br>' + (steps.length ? steps.join('<br>') : (a + ' + 0 = ' + a)) + '<br><b>Answer: ' + answer + '</b>';
      if(aO + bO >= 10) explain += explainTenCrossingAdd(aO, bO);
      return {kind:'addy3', op:'addy3', answer, html, choices: makeNumberChoices(answer), explain};
    }
    if(qType === 'missingAddend'){
      const result = rand(20,90)*10;
      const add = rand(1,9);
      const base = result - add;
      const html = '<div class="digitSentence">' + base + ' + <span class="blank">?</span> = ' + result + '</div>';
      const explain = 'To find the missing number, subtract the other way:<br>' + result + ' − ' + base + ' = ' + add + '<br><b>Answer: ' + add + '</b>';
      return {kind:'addy3', op:'addy3', answer: add, html, choices: makeNumberChoices(add), explain};
    }
    // moreThan
    const base = rand(100,800);
    const step = choice([10,20,30,50,100,200,300]);
    const html = '<div class="wordProblem"><span class="icon">🔢</span>' + step + ' more than ' + base + ' is equal to ___?</div>';
    const answer = base+step;
    const explain = '"More than" means add:<br>' + base + ' + ' + step + ' = ' + answer + '<br><b>Answer: ' + answer + '</b>';
    return {kind:'addy3', op:'addy3', answer, html, choices: makeNumberChoices(answer), explain};
  }

  // ---- Subtraction: column subtraction (with/without exchange), missing subtrahend, "X less than Y" ----
  function buildSubtractionY3(){
    const qType = choice(['column','missingSubtrahend','lessThan']);

    if(qType === 'column'){
      const withExchange = Math.random() < 0.6;
      let a, b;
      if(!withExchange){
        const aH = rand(2,9), aT = rand(2,9), aO = rand(2,9);
        a = aH*100+aT*10+aO;
        const bH = rand(0,aH), bT = rand(0,aT), bO = rand(0,aO);
        b = bH*100+bT*10+bO;
      } else if(Math.random() < 0.6){
        // force the ones column specifically to need borrowing (e.g. 14 - 9)
        const aH = rand(2,9), aT = rand(1,9), aO = rand(0,7);
        a = aH*100+aT*10+aO;
        const bH = rand(0,aH), bT = rand(0,aT-1);
        const bO = rand(aO+1, 9); // bO > aO, forces borrowing in the ones column
        b = bH*100+bT*10+bO;
      } else {
        a = rand(200,999);
        b = rand(11, a-1);
      }
      const answer = a-b;
      const aStr = String(a).padStart(3,'0').split('');
      const bStr = String(b).padStart(3,'0').split('');
      const html =
        '<div class="colGrid"><table class="colTable"><tr>' +
          '<td></td><td>'+aStr[0]+'</td><td>'+aStr[1]+'</td><td>'+aStr[2]+'</td>' +
        '</tr><tr>' +
          '<td class="opCell">−</td><td>'+bStr[0]+'</td><td>'+bStr[1]+'</td><td>'+bStr[2]+'</td>' +
        '</tr><tr class="ruleRow"><td></td><td></td><td></td><td></td></tr><tr>' +
          '<td></td><td class="missing">?</td><td class="missing">?</td><td class="missing">?</td>' +
        '</tr></table></div>';
      // Explain by taking away one part of b at a time (avoids formally
      // teaching "borrowing" -- works the same regardless of exchange).
      const aO = a%10, bH = Math.floor(b/100), bT = Math.floor((b%100)/10), bO = b%10;
      let steps = [], running = a;
      if(bH>0){ const prev = running; running -= bH*100; steps.push(prev + ' − ' + (bH*100) + ' = ' + running); }
      if(bT>0){ const prev = running; running -= bT*10; steps.push(prev + ' − ' + (bT*10) + ' = ' + running); }
      if(bO>0){ const prev = running; running -= bO; steps.push(prev + ' − ' + bO + ' = ' + running); }
      let explain = 'Take away each part of ' + b + ' separately:<br>' + (steps.length ? steps.join('<br>') : (a + ' − 0 = ' + a)) + '<br><b>Answer: ' + answer + '</b>';
      if(aO < bO) explain += explainTenCrossingSub(aO + 10, bO);
      return {kind:'suby3', op:'suby3', answer, html, choices: makeNumberChoices(answer), explain};
    }
    if(qType === 'missingSubtrahend'){
      const base = rand(20,90)*10 + rand(1,9);
      const sub = rand(1,9);
      const result = base-sub;
      const html = '<div class="digitSentence">' + base + ' − <span class="blank">?</span> = ' + result + '</div>';
      const explain = 'To find the missing number, subtract the other way:<br>' + base + ' − ' + result + ' = ' + sub + '<br><b>Answer: ' + sub + '</b>';
      return {kind:'suby3', op:'suby3', answer: sub, html, choices: makeNumberChoices(sub), explain};
    }
    // lessThan
    let base, step;
    do {
      base = rand(200,900);
      step = choice([10,20,30,50,100,200]);
    } while(step >= base);
    const html = '<div class="wordProblem"><span class="icon">🔢</span>' + step + ' less than ' + base + ' is equal to ___?</div>';
    const answer = base-step;
    const explain = '"Less than" means subtract:<br>' + base + ' − ' + step + ' = ' + answer + '<br><b>Answer: ' + answer + '</b>';
    return {kind:'suby3', op:'suby3', answer, html, choices: makeNumberChoices(answer), explain};
  }

  // ---- Multiplication: multiples of 2/5/10, times tables (2,3,4,8), doubling relations, 2-digit x 1-digit, scaling & comparing ----
  function buildMultiplicationY3(){
    const qType = choice(['tableMult','tableMissing','doubleRelation','mult2d','scale','compare','identifyMultiple']);
    const table = choice([2,3,4,8]);

    if(qType === 'identifyMultiple'){
      const target = choice([2,5,10]);
      const isMultiple = Math.random() < 0.5;
      let n;
      if(isMultiple){
        n = target * rand(2, 60);
      } else {
        do { n = rand(2, 600); } while(n % target === 0);
      }
      const html =
        '<div class="digitSentence" style="font-size:min(16vw,64px);">' + n + '</div>' +
        '<div class="opLabel" style="margin-top:-8px;">Is ' + n + ' a multiple of ' + target + '?</div>';
      const answer = isMultiple ? 'Yes' : 'No';
      const choices = shuffle(['Yes','No']).map(v => ({label:v, value:v}));
      return {kind:'multy3', op:'multy3', answer, html, choices};
    }
    if(qType === 'tableMult'){
      const n = rand(1,12);
      const answer = n*table;
      const html = '<div class="digitSentence">' + n + ' × ' + table + ' = <span class="blank">?</span></div>';
      return {kind:'multy3', op:'multy3', answer, html, choices: makeNumberChoices(answer)};
    }
    if(qType === 'tableMissing'){
      const n = rand(1,12);
      const product = n*table;
      const html = '<div class="digitSentence">' + table + ' × <span class="blank">?</span> = ' + product + '</div>';
      return {kind:'multy3', op:'multy3', answer: n, html, choices: makeNumberChoices(n)};
    }
    if(qType === 'doubleRelation'){
      const n = rand(1,10);
      const fromTable = choice([2,4]);
      const toTable = fromTable === 2 ? 4 : 8;
      const known = n*fromTable;
      const answer = n*toTable;
      const html =
        '<div class="opLabel" style="margin-bottom:10px;">' + n + ' × ' + fromTable + ' = ' + known + '. What is ' + n + ' × ' + toTable + '?</div>' +
        '<div class="digitSentence" style="font-size:min(14vw,50px);">' + n + ' × ' + toTable + ' = <span class="blank">?</span></div>';
      return {kind:'multy3', op:'multy3', answer, html, choices: makeNumberChoices(answer)};
    }
    if(qType === 'mult2d'){
      const withExchange = Math.random() < 0.5;
      let t, o, m;
      if(!withExchange){
        m = rand(2,4);
        o = rand(0, Math.floor(9/m));
        t = rand(1, Math.floor(9/m));
      } else {
        m = rand(2,7);
        do { o = rand(2,9); } while(o*m < 10);
        t = rand(1,9);
      }
      const twoDigit = t*10+o;
      const answer = twoDigit*m;
      const html = '<div class="digitSentence" style="font-size:min(13vw,52px);">' + twoDigit + ' × ' + m + ' = <span class="blank">?</span></div>';
      return {kind:'multy3', op:'multy3', answer, html, choices: makeNumberChoices(answer)};
    }
    if(qType === 'scale'){
      const a = rand(2,9), b = rand(2,9);
      const c = a*b;
      const b10 = b*10;
      const answer = c*10;
      const html =
        '<div class="opLabel" style="margin-bottom:10px;">' + a + ' × ' + b + ' = ' + c + '. Use this fact to help you.</div>' +
        '<div class="digitSentence" style="font-size:min(13vw,46px);">' + a + ' × ' + b10 + ' = <span class="blank">?</span></div>';
      return {kind:'multy3', op:'multy3', answer, html, choices: makeNumberChoices(answer)};
    }
    // compare
    const a = rand(1,9), b = rand(1,9), c = rand(1,9), d = rand(1,9);
    const v1 = a*b, v2 = c*d;
    const answer = v1 > v2 ? '>' : (v1 < v2 ? '<' : '=');
    const html =
      '<div class="digitSentence" style="font-size:min(9vw,32px);">' +
        a + ' × ' + b + ' <span class="blank" style="min-width:0.6em;">?</span> ' + c + ' × ' + d +
      '</div>' +
      '<div class="opLabel" style="margin-top:-8px;">Write &lt;, &gt; or =</div>';
    const choices = shuffle(['>','<','=']).map(s => ({label:s, value:s}));
    return {kind:'multy3', op:'multy3', answer, html, choices};
  }

  // ---- Division: sharing/grouping word problems, times-table facts, and fact families ----
  function buildDivisionY3(){
    const qType = choice(['tableDiv','wordProblem','wordProblem','factfam']);
    const table = choice([2,3,4,8]);

    if(qType === 'tableDiv'){
      const n = rand(1,12);
      const product = n*table;
      const html = '<div class="digitSentence">' + product + ' ÷ ' + table + ' = <span class="blank">?</span></div>';
      return {kind:'dvy3', op:'dvy3', answer: n, html, choices: makeNumberChoices(n)};
    }
    if(qType === 'factfam'){
      const a = rand(2,9), b = rand(2,9);
      const c = a*b;
      const html =
        '<div class="opLabel" style="margin-bottom:10px;">' + a + ' × ' + b + ' = ' + c + '</div>' +
        '<div class="digitSentence" style="font-size:min(14vw,50px);">' + c + ' ÷ ' + a + ' = <span class="blank">?</span></div>';
      return {kind:'dvy3', op:'dvy3', answer: b, html, choices: makeNumberChoices(b)};

    return {kind:'dvy3', op:'dvy3', answer: p.answer, html, choices: makeNumberChoices(p.answer)};
  }

  // ---- Year 3 fractions: add/subtract fractions with the SAME denominator (bar model) ----
  function fractionBarHTML(den, filledA, filledB, color1, color2){
    let cells = '';
    for(let i=0;i<den;i++){
      let fill = '#fff';
      if(i < filledA) fill = color1;
      else if(i < filledA+filledB) fill = color2;
      cells += '<div style="flex:1;height:44px;border:2px solid #2B2D42;background:'+fill+';"></div>';
    }
    return '<div style="display:flex;width:100%;max-width:380px;margin:0 auto 16px;border-radius:10px;overflow:hidden;border:2px solid #2B2D42;">' + cells + '</div>';
  }

  function buildFractionY3(){
    const isAdd = Math.random() < 0.5;
    const den = choice([4,5,6,7,8,9,10]);

    if(isAdd){
      const n1 = rand(1, den-2);
      const maxN2 = den - n1;
      const n2 = rand(1, Math.max(1, maxN2-1));
      const sumNum = n1 + n2;
      const bar = fractionBarHTML(den, n1, n2, '#FF6B6B', '#FFD166');
      const html =
        bar +
        '<div class="digitSentence" style="font-size:min(10vw,38px);">' +
          '<sup>'+n1+'</sup>⁄<sub>'+den+'</sub> + <sup>'+n2+'</sup>⁄<sub>'+den+'</sub> = <span class="blank">?</span>' +
        '</div>';
      const answerLabel = sumNum + '/' + den;
      const set = new Set([answerLabel]);
      let guard=0;
      while(set.size < 4 && guard < 30){
        guard++;
        const fakeNum = rand(1, den-1);
        if(fakeNum !== sumNum) set.add(fakeNum+'/'+den);
      }
      const choices = shuffle(Array.from(set)).map(l => ({label:l, value:l}));
      return {kind:'fracy3', op:'fracy3', answer: answerLabel, html, choices};
    } else {
      const n1 = rand(2, den-1);
      const n2 = rand(1, n1-1);
      const diff = n1-n2;
      const bar2 = fractionBarHTML(den, diff, n2, '#06D6A0', '#EADFC8');
      const html =
        bar2 +
        '<div class="digitSentence" style="font-size:min(10vw,38px);">' +
          '<sup>'+n1+'</sup>⁄<sub>'+den+'</sub> − <sup>'+n2+'</sup>⁄<sub>'+den+'</sub> = <span class="blank">?</span>' +
        '</div>';
      const answerLabel = diff + '/' + den;
      const set = new Set([answerLabel]);
      let guard=0;
      while(set.size < 4 && guard < 30){
        guard++;
        const fakeNum = rand(1, den-1);
        if(fakeNum !== diff) set.add(fakeNum+'/'+den);
      }
      const choices = shuffle(Array.from(set)).map(l => ({label:l, value:l}));
      return {kind:'fracy3', op:'fracy3', answer: answerLabel, html, choices};
    }
  }

  // ---- Length: mm / cm / m conversion, comparison & word problems ----
  function buildLength3(){
    const qType = choice(['cmToMm','mmToCm','mToCm','cmToM','compareUnits','compareObjects','cmMmTotal']);

    if(qType === 'cmToMm'){
      const n = rand(1,30);
      const answer = n*10;
      const html = '<div class="digitSentence" style="font-size:min(11vw,42px);">' + n + ' cm = <span class="blank">?</span> mm</div>';
      return {kind:'len3', op:'len3', answer, html, choices: makeNumberChoices(answer)};
    }
    if(qType === 'mmToCm'){
      const n = rand(1,30)*10;
      const answer = n/10;
      const html = '<div class="digitSentence" style="font-size:min(11vw,42px);">' + n + ' mm = <span class="blank">?</span> cm</div>';
      return {kind:'len3', op:'len3', answer, html, choices: makeNumberChoices(answer)};
    }
    if(qType === 'mToCm'){
      const n = rand(1,9);
      const answer = n*100;
      const html = '<div class="digitSentence" style="font-size:min(11vw,42px);">' + n + ' m = <span class="blank">?</span> cm</div>';
      return {kind:'len3', op:'len3', answer, html, choices: makeNumberChoices(answer)};
    }
    if(qType === 'cmToM'){
      const n = rand(1,9)*100;
      const answer = n/100;
      const html = '<div class="digitSentence" style="font-size:min(11vw,42px);">' + n + ' cm = <span class="blank">?</span> m</div>';
      return {kind:'len3', op:'len3', answer, html, choices: makeNumberChoices(answer)};
    }
    if(qType === 'compareUnits'){
      function randLen(){
        const unit = choice(['mm','cm','m']);
        const value = unit === 'm' ? rand(1,5) : (unit === 'cm' ? rand(1,30) : rand(1,50));
        const mm = value * (unit === 'mm' ? 1 : unit === 'cm' ? 10 : 1000);
        return {value, unit, mm};
      }
      let l1 = randLen(), l2 = randLen();
      let guard = 0;
      while(l1.mm === l2.mm && guard < 20){ l2 = randLen(); guard++; }
      const answer = l1.mm > l2.mm ? '>' : (l1.mm < l2.mm ? '<' : '=');
      const html =
        '<div class="digitSentence" style="font-size:min(9vw,34px);">' +
          l1.value + ' ' + l1.unit + ' <span class="blank" style="min-width:0.6em;">?</span> ' + l2.value + ' ' + l2.unit +
        '</div>' +
        '<div class="opLabel" style="margin-top:-8px;">Write &lt;, &gt; or =</div>';
      const choices = shuffle(['>','<','=']).map(s => ({label:s, value:s}));
      return {kind:'len3', op:'len3', answer, html, choices};
    }
    if(qType === 'compareObjects'){
      const aCm = rand(3,20);
      let bMm = rand(10,220);
      let guard = 0;
      while(bMm === aCm*10 && guard < 20){ bMm = rand(10,220); guard++; }
      const answer = aCm*10 > bMm ? 'The pencil' : 'The crayon';
      const html =
        '<div class="wordProblem"><span class="icon">✏️</span>A pencil is ' + aCm + ' cm long. A crayon is ' + bMm + ' mm long. Which is longer?</div>';
      const choices = shuffle(['The pencil','The crayon']).map(v => ({label:v, value:v}));
      return {kind:'len3', op:'len3', answer, html, choices};
    }
    // cmMmTotal
    const a = rand(1,9), b = rand(1,9);
    const answer = a*10 + b;
    const html = '<div class="wordProblem"><span class="icon">🧵</span>A ribbon is ' + a + ' cm and ' + b + ' mm long. What is its length in mm?</div>';
    return {kind:'len3', op:'len3', answer, html, choices: makeNumberChoices(answer)};
  }

  // ---- Perimeter of rectangles ----
  function buildPerimeter(){
    const qType = choice(['calc','missing','compare']);

    if(qType === 'calc'){
      const l = rand(3,15), w = rand(2,12);
      const answer = 2*(l+w);
      const html =
        '<div class="wordProblem"><span class="icon">📐</span>A rectangle has a length of ' + l + ' cm and a width of ' + w + ' cm. What is its perimeter?</div>';
      return {kind:'perim', op:'perim', answer, html, choices: makeNumberChoices(answer)};
    }
    if(qType === 'missing'){
      const l = rand(3,15), w = rand(2,12);
      const perimeter = 2*(l+w);
      const html =
        '<div class="wordProblem"><span class="icon">📐</span>A rectangle has a perimeter of ' + perimeter + ' cm. Its length is ' + l + ' cm. What is its width?</div>';
      return {kind:'perim', op:'perim', answer: w, html, choices: makeNumberChoices(w)};
    }
    // compare
    function randRect(){ return {l: rand(2,12), w: rand(2,12)}; }
    const r1 = randRect(), r2 = randRect();
    const p1 = 2*(r1.l+r1.w), p2 = 2*(r2.l+r2.w);
    const answer = p1 > p2 ? '>' : (p1 < p2 ? '<' : '=');
    const html =
      '<div class="wordProblem"><span class="icon">📐</span>Rectangle A: ' + r1.l + ' cm × ' + r1.w + ' cm.<br>Rectangle B: ' + r2.l + ' cm × ' + r2.w + ' cm.<br>Compare the perimeters: A ___ B</div>';
    const choices = shuffle(['>','<','=']).map(s => ({label:s, value:s}));
    return {kind:'perim', op:'perim', answer, html, choices};
  }

  // ---- Number patterns: find the missing number in a sequence ----
  function buildPattern(){
    const stepUp = Math.random() < 0.5;
    const step = choice([1,2,3,4,5,10,20,25,50,100]);
    const signedStep = stepUp ? step : -step;
    const length = 5;
    const start = stepUp ? rand(0,150) : step*(length-1) + rand(0,150);
    const seq = [];
    for(let i=0;i<length;i++) seq.push(start + signedStep*i);

    const missingIdx = choice([length-1, 2, 1]);
    const answer = seq[missingIdx];
    const display = seq.map((v,i) => i === missingIdx ? '<span class="blank">?</span>' : v);

    const html =
      '<div class="digitSentence" style="font-size:min(9vw,34px);">' + display.join(', ') + '</div>' +
      '<div class="opLabel" style="margin-top:-8px;">What number is missing from the pattern?</div>';

    return {kind:'pattern', op:'pattern', answer, html, choices: makeNumberChoices(answer)};
  }

  // ---- Number line: what number is the arrow pointing to? ----
  function buildNumberLine(){
    const totalMax = choice([50,100,100,1000]);
    const intervals = 10;
    const step = totalMax / intervals;
    const markedIdx = rand(1, intervals-1);
    const answer = markedIdx * step;

    let ticks = '';
    for(let i=0;i<=intervals;i++){
      const isMarked = i === markedIdx;
      ticks +=
        '<div style="flex:1;display:flex;flex-direction:column;align-items:center;">' +
          (isMarked ? '<div style="font-size:20px;line-height:1;color:var(--coral-dark);">▲</div>' : '<div style="height:20px;"></div>') +
          '<div style="width:2px;height:16px;background:var(--ink);"></div>' +
        '</div>';
    }

    const html =
      '<div style="display:flex;width:100%;max-width:420px;margin:0 auto;">' + ticks + '</div>' +
      '<div style="display:flex;justify-content:space-between;width:100%;max-width:420px;margin:2px auto 20px;font-weight:700;color:#8a8472;font-size:13px;">' +
        '<span>0</span><span>' + totalMax + '</span>' +
      '</div>' +
      '<div class="opLabel" style="margin-top:-4px;">What number is the arrow pointing to?</div>';

    return {kind:'numline', op:'numline', answer, html, choices: makeNumberChoices(answer)};
  }

  // ---- Partitioning: value of a digit / missing part of H + T + O ----
  function buildPartition(){
    const n = rand(12, 987);
    const h = Math.floor(n/100), t = Math.floor((n%100)/10), o = n%10;
    const parts = [];
    if(h > 0) parts.push({label:'hundreds', value: h*100});
    parts.push({label:'tens', value: t*10});
    parts.push({label:'ones', value: o});

    if(Math.random() < 0.5){
      const p = choice(parts);
      const html = '<div class="wordProblem"><span class="icon">🔢</span>In the number ' + n + ', what is the value of the digit in the ' + p.label + ' place?</div>';
      return {kind:'partition', op:'partition', answer: p.value, html, choices: makeNumberChoices(p.value)};
    }

    const blankIdx = rand(0, parts.length-1);
    const eqParts = parts.map((p,i) => i === blankIdx ? '<span class="blank">?</span>' : p.value);
    const html = '<div class="digitSentence" style="font-size:min(10vw,38px);">' + n + ' = ' + eqParts.join(' + ') + '</div>';
    const answer = parts[blankIdx].value;
    return {kind:'partition', op:'partition', answer, html, choices: makeNumberChoices(answer)};
  }

  // ---- Pictograms: read a pictogram with a symbol key (each symbol = 2, 5 or 10) ----
  const PICTO_THEMES = [
    {title:'Ice creams sold', icon:'🍦', names:['Monday','Tuesday','Wednesday','Thursday']},
    {title:'Books read', icon:'📖', names:['Class A','Class B','Class C','Class D']},
    {title:'Cars in the car park', icon:'🚗', names:['Red','Blue','Silver','Black']},
    {title:'Goals scored', icon:'⚽', names:['Week 1','Week 2','Week 3','Week 4']}
  ];

  function buildPictogram(){
    const theme = choice(PICTO_THEMES);
    const scale = choice([2,5,10]);
    const n = 4;
    const counts = [];
    while(counts.length < n){
      const wholeSymbols = rand(1,6);
      const halfExtra = (scale % 2 === 0 && Math.random() < 0.3) ? scale/2 : 0;
      const v = wholeSymbols*scale + halfExtra;
      if(!counts.includes(v)) counts.push(v);
    }

    let rows = '';
    for(let i=0;i<n;i++){
      const whole = Math.floor(counts[i]/scale);
      const hasHalf = counts[i] % scale !== 0;
      let icons = '';
      for(let s=0;s<whole;s++) icons += '<span style="font-size:20px;">'+theme.icon+'</span>';
      if(hasHalf) icons += '<span style="font-size:20px;opacity:0.4;">'+theme.icon+'</span>';
      rows +=
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">' +
          '<div style="width:88px;flex-shrink:0;font-weight:700;font-size:12px;color:#8a8472;">'+theme.names[i]+'</div>' +
          '<div style="display:flex;gap:2px;flex-wrap:wrap;">'+icons+'</div>' +
        '</div>';
    }

    const chartHtml =
      '<div class="chartWrap">' +
        '<div class="chartTitle">'+theme.title+'</div>' +
        '<div style="padding:2px 4px;">'+rows+'</div>' +
        '<div style="font-size:12px;color:#8a8472;text-align:center;padding-bottom:4px;">Key: each '+theme.icon+' = '+scale+'</div>' +
      '</div>';

    const qType = choice(['total','howmany','diff','most']);
    const maxVal = Math.max(...counts);
    const iMax = counts.indexOf(maxVal);
    let questionText, answer;
    if(qType === 'most'){
      questionText = 'Which had the most?';
      answer = theme.names[iMax];
    } else if(qType === 'total'){
      questionText = 'What is the total altogether?';
      answer = counts.reduce((s,v)=>s+v,0);
    } else if(qType === 'howmany'){
      const i = rand(0,n-1);
      questionText = 'How many for ' + theme.names[i] + '?';
      answer = counts[i];
    } else {
      let i1 = rand(0,n-1), i2 = rand(0,n-1);
      while(i2 === i1) i2 = rand(0,n-1);
      const hi = counts[i1] > counts[i2] ? i1 : i2;
      const lo = hi === i1 ? i2 : i1;
      questionText = 'How many more for ' + theme.names[hi] + ' than ' + theme.names[lo] + '?';
      answer = counts[hi] - counts[lo];
    }

    const html = chartHtml + '<div class="opLabel" style="margin-top:-8px;">'+questionText+'</div>';
    let choices;
    if(qType === 'most'){
      choices = shuffle(theme.names.slice()).map(nm => ({label:nm, value:nm}));
    } else {
      choices = makeNumberChoices(answer);
    }

    return {kind:'pictogram', op:'pictogram', answer, html, choices};
  }

    if(op === 'len3') return buildLength3();
    if(op === 'perim') return buildPerimeter();
    if(op === 'pattern') return buildPattern();
    if(op === 'numline') return buildNumberLine();
    if(op === 'partition') return buildPartition();
    if(op === 'pictogram') return buildPictogram();
    return buildArithmetic(op);

  function renderTrail(){
    els.trail.innerHTML = '';
    for(let i = 0; i < state.fishGoal; i++){
      const span = document.createElement('span');
      span.className = 'pawSlot' + (i < state.fishFill ? ' filled' : '');
      span.innerHTML = '<img src="' + TRAIL_ICON + '" alt="fish" style="width:100%;height:100%;object-fit:contain;display:block;">';
      els.trail.appendChild(span);
    }
    els.streakBadge.textContent = state.fishFill + '/' + state.fishGoal;
  }

  function newProblem(){
    state.locked = false;
    els.feedback.textContent = '';
    els.feedback.className = 'feedback';

    const p = buildProblem();
    state.current = p;

    els.explainPanel.style.display = 'none';
    els.explainPanel.innerHTML = '';
    els.explainBtn.style.display = p.explain ? '' : 'none';

    const meta = OP_META[p.op] || {};
    if(p.kind === 'arithmetic'){
      els.opLabel.style.display = '';
      els.opLabel.textContent = meta.label || '';
    } else {
      // fraction/measurement/statistics builders embed their own
      // inline prompt inside .html, so hide the generic top label
      els.opLabel.style.display = 'none';
    }

    els.displayArea.innerHTML = p.html;

    if(state.level === 'y3open'){
      els.choices.style.display = 'none';
      els.choices.innerHTML = '';
      els.openAnswer.style.display = 'flex';
      els.openInput.value = '';
      els.openInput.className = 'openInput';
      els.openInput.disabled = false;
      els.checkBtn.disabled = false;
      setTimeout(() => els.openInput.focus(), 30);
    } else {
      els.openAnswer.style.display = 'none';
      els.choices.style.display = '';
      els.choices.innerHTML = '';
      p.choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choiceBtn';
        if(String(c.label).length > 3) btn.style.fontSize = '24px';
        btn.textContent = c.label;
        btn.addEventListener('click', () => handleAnswer(c.value, btn));
        els.choices.appendChild(btn);
      });
    }
  }

  // Shared reward/progression logic used by both multiple-choice and typed-answer modes.
  function processResult(correct, correctLabel){
    if(correct){
      els.feedback.textContent = pickPraise();
      els.feedback.className = 'feedback good';

      state.fishFill++;
      localStorage.setItem('nt_fishfill', state.fishFill);
      let goalReached = false;
      if(state.fishFill >= state.fishGoal){
        state.fishFill = 0;
        localStorage.setItem('nt_fishfill', 0);
        goalReached = true;
        els.feedback.textContent = "Time to cast your line! 🎣";
      }
      renderTrail();

      if(goalReached){
        setTimeout(openFishChoice, 750);
      } else {
        setTimeout(newProblem, 750);
      }
    } else {
      els.feedback.textContent = 'Almost! It was ' + correctLabel + '. Try the next one!';
      els.feedback.className = 'feedback bad';

      // A wrong answer no longer resets progress toward the next catch --
      // it just doesn't count. The child keeps making progress overall.
      setTimeout(newProblem, 1600);
    }
  }

  function handleAnswer(val, btn){
    if(state.locked) return;
    state.locked = true;

    const correct = val === state.current.answer;
    const allBtns = Array.from(els.choices.children);

    if(correct){
      btn.classList.add('correct');
      allBtns.forEach(b => { if(b !== btn) b.classList.add('dim'); });
    } else {
      btn.classList.add('wrong');
      // find the button whose recorded value matches the correct answer
      const idx = state.current.choices.findIndex(c => c.value === state.current.answer);
      allBtns.forEach((b, i) => {
        if(i === idx) b.classList.add('correct');
        else if(b !== btn) b.classList.add('dim');
      });
    }

    const idx2 = state.current.choices.findIndex(c => c.value === state.current.answer);
    const correctLabel = idx2 >= 0 ? state.current.choices[idx2].label : state.current.answer;
    processResult(correct, correctLabel);
  }

  // Compares a freely typed answer against the expected answer.
  // Numeric answers are compared as numbers; everything else as trimmed,
  // case-insensitive text (covers fraction labels, <,>,= signs, words, names).
  function checkTypedAnswer(raw, answer){
    const a = String(raw).trim();
    const b = String(answer).trim();
    if(a.length === 0) return false;
    if(/^-?\d+(\.\d+)?$/.test(a) && /^-?\d+(\.\d+)?$/.test(b)){
      return Number(a) === Number(b);
    }
    return a.toLowerCase() === b.toLowerCase();
  }

  function handleTypedAnswer(){
    if(state.locked) return;
    const raw = els.openInput.value;
    if(raw.trim() === '') return;
    state.locked = true;

    const correct = checkTypedAnswer(raw, state.current.answer);
    els.openInput.disabled = true;
    els.checkBtn.disabled = true;
    els.openInput.classList.add(correct ? 'correct' : 'wrong');

    processResult(correct, state.current.answer);
  }

  function pickPraise(){
    const lines = ['Nice work! 🎉','You got it! ⭐','Super! 🌟','Great job! 🙌','Yes! 🐟','Brilliant! 🎈'];
    return lines[rand(0, lines.length - 1)];
  }

  // ---- Fish choice sheet ----
  // ---- Fishing: catch a random fish from the unlocked pool ----
  function openFishChoice(){
    state.awaitingCatch = true;
    let pool = lockedSpecies();
    if(pool.length === 0){
      // Every species already unlocked -- let the child pick any one
      // again, just to celebrate a bonus catch.
      pool = FISH_LIST;
    }
    // Offer a handful of mystery locks -- the child doesn't know which
    // fish is behind which lock until they tap one and it's revealed.
    const offerCount = Math.min(6, pool.length);
    const offered = shuffle(pool.slice()).slice(0, offerCount);

    els.chooseGrid.innerHTML = '';
    offered.forEach(fish => {
      const btn = document.createElement('button');
      btn.className = 'fishOption choosable';
      btn.innerHTML =
        '<div class="lockIcon">🔒</div>' +
        '<div class="fishOptionName">???</div>';
      btn.addEventListener('click', () => chooseFish(fish));
      els.chooseGrid.appendChild(btn);
    });
    els.chooseOverlay.classList.add('show');
  }

  function chooseFish(fish){
    const isFirstOfSpecies = !state.album[fish.id];
    state.album[fish.id] = (state.album[fish.id] || 0) + 1;
    state.totalCaught++;
    saveAlbum();

    els.chooseOverlay.classList.remove('show');

    els.catchTitle.textContent = isFirstOfSpecies ? '🎉 New species unlocked!' : '🎉 Nice catch!';
    els.catchCard.innerHTML =
      '<div class="catchFishImg">' + fishImgHTML(fish) + '</div>' +
      '<div class="catchFishName">' + fish.name + (isFirstOfSpecies ? ' 🆕' : '') + '</div>' +
      '<div class="catchFishDesc">' + fish.desc + '</div>' +
      '<div class="catchFishCount">Caught ' + state.album[fish.id] + '× so far · ' + state.totalCaught + ' fish caught in total</div>';
    els.catchOverlay.classList.add('show');
  }

  function closeCatch(){
    els.catchOverlay.classList.remove('show');
    state.awaitingCatch = false;
    newProblem();
  }

  // ---- Lake / Album overlay ----
  function switchLakeTab(tab){
    state.lakeTab = tab;
    els.tabLake.classList.toggle('active', tab === 'lake');
    els.tabAlbum.classList.toggle('active', tab === 'album');
    els.lakeView.style.display = tab === 'lake' ? 'flex' : 'none';
    els.albumView.style.display = tab === 'album' ? 'block' : 'none';
    if(tab === 'lake') renderLake();
    else renderAlbum();
  }

  function renderLake(){
    els.tankWater.innerHTML = '';
    for(let i=0;i<6;i++){
      const b = document.createElement('div');
      b.className = 'bubble';
      b.style.left = rand(5,95) + '%';
      b.style.animationDuration = rand(6,11) + 's';
      b.style.animationDelay = rand(0,8) + 's';
      els.tankWater.appendChild(b);
    }
    // The lake always looks lively: a handful of each currently-unlocked species swims by.
    const pool = unlockedSpecies();
    let uid = 0;
    pool.forEach(fish => {
      const copies = rand(1,3);
      for(let c=0;c<copies;c++){
        const wrap = document.createElement('div');
        wrap.className = 'swimFish';
        const size = rand(34, 54);
        wrap.style.width = size + 'px';
        wrap.style.height = (size*0.6) + 'px';
        wrap.style.top = rand(6, 82) + '%';
        wrap.style.left = rand(0, 60) + '%';
        wrap.style.setProperty('--swim-dist', rand(60,160) + 'px');
        wrap.style.animationDuration = rand(3,7) + 's';
        wrap.style.animationDelay = rand(0,3) + 's';
        wrap.innerHTML = fishImgHTML(fish);
        els.tankWater.appendChild(wrap);
      }
    });
    const next = pool.length < FISH_LIST.length
      ? ' Answer 15 more to choose your next fish!'
      : ' All species discovered!';
    els.lakeSubtitle.textContent = (pool.length === 0
      ? 'No fish yet.'
      : pool.length + ' species swim here.') + next;
  }

  function renderAlbum(){
    els.albumGrid.innerHTML = '';
    FISH_LIST.forEach((fish) => {
      const card = document.createElement('div');
      const caughtCount = state.album[fish.id] || 0;

      if(caughtCount === 0){
        card.className = 'fishOption locked';
        card.innerHTML =
          '<div class="lockIcon">🔒</div>' +
          '<div class="fishOptionSub">Not chosen yet</div>';
      } else {
        card.className = 'fishOption';
        card.innerHTML =
          '<div class="fishOptionBadge">×' + caughtCount + '</div>' +
          '<div style="width:52px;height:34px;">' + fishImgHTML(fish) + '</div>' +
          '<div class="fishOptionName">' + fish.name + '</div>' +
          '<div class="fishOptionSub">' + fish.desc + '</div>';
      }
      els.albumGrid.appendChild(card);
    });
  }

  function setMode(mode){
    if(state.level === 'y3' || state.level === 'y3open'){
      state.modeY3 = mode;
      localStorage.setItem('nt_mode_y3', mode);
      Array.from(els.modeBarY3.children).forEach(b => {
        b.classList.toggle('active', b.dataset.mode === mode);
      });
    } else {
      state.mode = mode;
      localStorage.setItem('nt_mode', mode);
      Array.from(els.modeBar.children).forEach(b => {
        b.classList.toggle('active', b.dataset.mode === mode);
      });
    }
    newProblem();
  }

  function setLevel(level){
    state.level = level;
    localStorage.setItem('nt_level', level);
    Array.from(els.levelToggle.children).forEach(b => {
      b.classList.toggle('active', b.dataset.level === level);
    });
    if(level === 'y3' || level === 'y3open'){
      els.modeBar.style.display = 'none';
      els.modeBarY3.style.display = '';
    } else {
      els.modeBar.style.display = '';
      els.modeBarY3.style.display = 'none';
    }
    newProblem();
  }

  // ---- wire up events ----
  Array.from(els.modeBar.children).forEach(b => {
    b.addEventListener('click', () => setMode(b.dataset.mode));
  });
  Array.from(els.modeBarY3.children).forEach(b => {
    b.addEventListener('click', () => setMode(b.dataset.mode));
  });
  Array.from(els.levelToggle.children).forEach(b => {
    b.addEventListener('click', () => setLevel(b.dataset.level));
  });

  els.settingsBtn.addEventListener('click', () => {
    els.overlay.classList.add('show');
  });
  els.closeSheet.addEventListener('click', () => {
    els.overlay.classList.remove('show');
  });
  els.overlay.addEventListener('click', (e) => {
    if(e.target === els.overlay) els.overlay.classList.remove('show');
  });

  els.lakeBtn.addEventListener('click', () => {
    switchLakeTab('lake');
    els.lakeOverlay.classList.add('show');
  });
  els.closeLake.addEventListener('click', () => {
    els.lakeOverlay.classList.remove('show');
  });
  els.lakeOverlay.addEventListener('click', (e) => {
    if(e.target === els.lakeOverlay) els.lakeOverlay.classList.remove('show');
  });
  els.tabLake.addEventListener('click', () => switchLakeTab('lake'));
  els.tabAlbum.addEventListener('click', () => switchLakeTab('album'));
  els.catchContinueBtn.addEventListener('click', closeCatch);

  els.checkBtn.addEventListener('click', handleTypedAnswer);

  els.explainBtn.addEventListener('click', () => {
    if(!state.current || !state.current.explain) return;
    const showing = els.explainPanel.style.display !== 'none';
    if(showing){
      els.explainPanel.style.display = 'none';
    } else {
      els.explainPanel.innerHTML = state.current.explain;
      els.explainPanel.style.display = 'block';
    }
  });
  els.openInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') handleTypedAnswer();
  });

  els.maxNum.value = state.maxNum;

  els.maxNum.addEventListener('change', () => {
    state.maxNum = parseInt(els.maxNum.value);
    localStorage.setItem('nt_max', state.maxNum);
    newProblem();
  });
  els.resetBtn.addEventListener('click', () => {
    if(confirm('Reset your whole fish collection? This cannot be undone.')){
      state.album = {};
      state.totalCaught = 0;
      saveAlbum();
    }
  });


  // ---- init ----
  Array.from(els.levelToggle.children).forEach(b => {
    b.classList.toggle('active', b.dataset.level === state.level);
  });
  if(state.level === 'y3' || state.level === 'y3open'){
    els.modeBar.style.display = 'none';
    els.modeBarY3.style.display = '';
  }
  Array.from(els.modeBar.children).forEach(b => {
    b.classList.toggle('active', b.dataset.mode === state.mode);
  });
  Array.from(els.modeBarY3.children).forEach(b => {
    b.classList.toggle('active', b.dataset.mode === state.modeY3);
  });
  renderTrail();
  newProblem();
})();
</script>

</body>
</html>
